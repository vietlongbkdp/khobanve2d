<body>
<div id="root"></div>
<script type="text/babel">
const {
  Box,Container,Grid,Stack,Paper,Typography,Button,IconButton,
  AppBar,Toolbar,Drawer,BottomNavigation,BottomNavigationAction,
  Card,CardContent,CardMedia,CardActionArea,
  Chip,Avatar,Badge,Divider,
  List,ListItem,ListItemButton,ListItemText,ListItemIcon,
  TextField,Select,MenuItem,FormControl,InputLabel,
  Dialog,DialogTitle,DialogContent,DialogActions,
  Alert,CircularProgress,Skeleton,Snackbar,LinearProgress,
  Table,TableBody,TableCell,TableHead,TableRow,TableContainer,
  Tabs,Tab,Switch,FormControlLabel,Checkbox,
  InputAdornment,Fab,Tooltip,Rating,Collapse,
  ThemeProvider,createTheme,CssBaseline,useMediaQuery,alpha,
} = MaterialUI;
const useTheme = MaterialUI.useTheme;
const {useState,useEffect,useCallback,useRef,useMemo} = React;

// ── THEME ──
const theme = createTheme({
  palette:{
    primary:{main:'#2563EB',light:'#3B82F6',dark:'#1D4ED8',contrastText:'#fff'},
    secondary:{main:'#059669',light:'#10B981',dark:'#047857',contrastText:'#fff'},
    warning:{main:'#F59E0B'},error:{main:'#EF4444'},
    background:{default:'#F1F5F9',paper:'#fff'},
    text:{primary:'#0F172A',secondary:'#64748B'},
  },
  typography:{
    fontFamily:"'Be Vietnam Pro',sans-serif",
    h1:{fontWeight:900},h2:{fontWeight:800},h3:{fontWeight:800},
    h4:{fontWeight:700},h5:{fontWeight:700},h6:{fontWeight:700},
    button:{textTransform:'none',fontWeight:700},
  },
  shape:{borderRadius:12},
  components:{
    MuiButton:{styleOverrides:{root:{textTransform:'none',fontFamily:"'Be Vietnam Pro',sans-serif",fontWeight:700,borderRadius:10},contained:{boxShadow:'none'}}},
    MuiCard:{styleOverrides:{root:{borderRadius:16,boxShadow:'0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04)'}}},
    MuiChip:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif",fontWeight:600}}},
    MuiOutlinedInput:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif",borderRadius:10}}},
    MuiInputLabel:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif"}}},
    MuiMenuItem:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif"}}},
    MuiTab:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif",fontWeight:600,textTransform:'none'}}},
    MuiTableCell:{styleOverrides:{root:{fontFamily:"'Be Vietnam Pro',sans-serif"}}},
    MuiAppBar:{styleOverrides:{root:{boxShadow:'0 1px 3px rgba(0,0,0,.1)'}}},
  },
});

// ── CATS ──
const CATS = [
  {id:'kien-truc', label:'Kiến Trúc',       emoji:'🏛️', color:'#2563EB', bg:'#EFF6FF', fa:'fa-building'},
  {id:'co-khi',   label:'Cơ Khí & CNC',    emoji:'⚙️', color:'#7C3AED', bg:'#F5F3FF', fa:'fa-gear'},
  {id:'cong',     label:'Cổng & Hàng Rào', emoji:'🚪', color:'#0891B2', bg:'#ECFEFF', fa:'fa-border-all'},
  {id:'lazer',    label:'Lazer & Trang Trí',emoji:'✨', color:'#D97706', bg:'#FFFBEB', fa:'fa-wand-magic-sparkles'},
  {id:'do-an',    label:'Đồ Án',            emoji:'📐', color:'#DC2626', bg:'#FEF2F2', fa:'fa-ruler-combined'},
  {id:'xay-dung', label:'Thi Công XD',      emoji:'🏗️', color:'#059669', bg:'#F0FDF4', fa:'fa-helmet-safety'},
];
const catOf = id => CATS.find(c=>c.id===id)||{label:id,emoji:'📁',color:'#64748B',bg:'#F1F5F9',fa:'fa-folder'};

// ── UTILS ──
const vnd = n => (Number(n)||0).toLocaleString('vi-VN')+'đ';
const genOid = () => 'KBV'+Date.now().toString(36).toUpperCase().slice(-6);
const formatBytes = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'kB':(b/1048576).toFixed(1)+'MB';
const FA = ({icon,style,className='',...p}) => <i className={`fa-solid fa-${icon} ${className}`} style={style} {...p}/>;

// ── useProducts ──
function useProducts(){
  const [prods,setProds] = useState([]);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    fetch('/api/products').then(r=>r.ok?r.json():null).then(data=>{
      if(data&&Array.isArray(data)&&data.length>0){
        setProds(data.map(p=>({
          id:p._id, _id:p._id, cat:p.category, title:p.title,
          price:p.price, oldPrice:p.originalPrice||null,
          desc:p.description, images:p.images||[],
          ft:p.fileType, fc:p.fileCount||0, fileCount:p.fileCount||0,
          fileSize:p.fileSize, dl:p.downloadCount||0, downloadCount:p.downloadCount||0,
          rate:p.rating||5, rev:p.reviewCount||0,
          free:!!p.isFree, isFree:!!p.isFree,
          hot:p.isHot||false, isHot:p.isHot||false, isNew:p.isNew||false,
          tags:p.tags||[], code:p.code, subcategory:p.subcategory,
        })));
      }
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);
  return {prods,loading};
}

// ── LIGHTBOX ──
function Lightbox({imgs,startIdx,onClose}){
  const [idx,setIdx]   = useState(startIdx||0);
  const [zoom,setZoom] = useState(1);
  const [pos,setPos]   = useState({x:0,y:0});
  const [drag,setDrag] = useState(false);
  const [ds,setDs]     = useState({x:0,y:0});
  const lt = useRef(null);
  useEffect(()=>{ setZoom(1); setPos({x:0,y:0}); },[idx]);
  useEffect(()=>{
    const h = e=>{
      if(e.key==='Escape'){if(zoom>1){setZoom(1);setPos({x:0,y:0});}else onClose();}
      if(e.key==='ArrowRight'&&zoom===1) setIdx(i=>Math.min(i+1,imgs.length-1));
      if(e.key==='ArrowLeft'&&zoom===1)  setIdx(i=>Math.max(i-1,0));
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[zoom,imgs.length]);
  const onWheel = e=>{e.preventDefault();const d=e.deltaY>0?-.3:.3;setZoom(z=>Math.max(1,Math.min(5,z+d)));};
  const onMD = e=>{if(zoom<=1)return;e.preventDefault();setDrag(true);setDs({x:e.clientX-pos.x,y:e.clientY-pos.y});};
  const onMM = e=>{if(!drag)return;setPos({x:e.clientX-ds.x,y:e.clientY-ds.y});};
  return(
    <Box onClick={onClose} sx={{position:'fixed',inset:0,bgcolor:'rgba(0,0,0,.92)',zIndex:2000,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      cursor:zoom>1?(drag?'grabbing':'grab'):'default'}}
      onMouseMove={onMM} onMouseUp={()=>setDrag(false)} onMouseLeave={()=>setDrag(false)}>
      {/* Toolbar */}
      <Box sx={{position:'absolute',top:0,left:0,right:0,height:56,
        background:'linear-gradient(to bottom,rgba(0,0,0,.7),transparent)',
        display:'flex',alignItems:'center',justifyContent:'space-between',px:2,zIndex:1}}
        onClick={e=>e.stopPropagation()}>
        <Stack direction="row" spacing={1} alignItems="center">
          <IconButton onClick={()=>{setZoom(z=>Math.max(1,z-.5));if(zoom-.5<=1)setPos({x:0,y:0});}} size="small" sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}}>
            <FA icon="minus" style={{fontSize:14}}/>
          </IconButton>
          <Typography variant="caption" sx={{color:'#fff',fontWeight:700,minWidth:44,textAlign:'center'}}>{Math.round(zoom*100)}%</Typography>
          <IconButton onClick={()=>setZoom(z=>Math.min(5,z+.5))} size="small" sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}}>
            <FA icon="plus" style={{fontSize:14}}/>
          </IconButton>
          {zoom>1&&<Button size="small" onClick={()=>{setZoom(1);setPos({x:0,y:0});}} sx={{color:'rgba(255,255,255,.7)',fontSize:11}}>Reset</Button>}
        </Stack>
        {imgs.length>1&&<Typography variant="caption" sx={{color:'rgba(255,255,255,.7)',fontWeight:600}}>{idx+1}/{imgs.length}</Typography>}
        <IconButton onClick={onClose} sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}} size="small">
          <FA icon="xmark"/>
        </IconButton>
      </Box>
      {/* Image */}
      <Box sx={{flex:1,width:'100%',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}
        onWheel={onWheel}>
        <img ref={lt} src={imgs[idx]} alt="" onMouseDown={onMD}
          onDoubleClick={()=>{if(zoom===1)setZoom(2.5);else{setZoom(1);setPos({x:0,y:0});}}}
          style={{maxWidth:'100vw',maxHeight:'calc(100vh - 56px - 80px)',objectFit:'contain',
            transform:`scale(${zoom}) translate(${pos.x/zoom}px,${pos.y/zoom}px)`,
            transformOrigin:'center',transition:drag?'none':'transform .15s ease',
            cursor:zoom>1?(drag?'grabbing':'grab'):'zoom-in',userSelect:'none',WebkitUserDrag:'none',display:'block'}}
          draggable={false}/>
      </Box>
      {/* Prev/Next */}
      {idx>0&&zoom===1&&<IconButton onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}} size="large"
        sx={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',
          color:'#fff',bgcolor:'rgba(255,255,255,.12)',':hover':{bgcolor:'rgba(255,255,255,.25)'}}}>
        <FA icon="chevron-left"/>
      </IconButton>}
      {idx<imgs.length-1&&zoom===1&&<IconButton onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}} size="large"
        sx={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
          color:'#fff',bgcolor:'rgba(255,255,255,.12)',':hover':{bgcolor:'rgba(255,255,255,.25)'}}}>
        <FA icon="chevron-right"/>
      </IconButton>}
      {/* Thumbnails */}
      {imgs.length>1&&<Box onClick={e=>e.stopPropagation()}
        sx={{position:'absolute',bottom:0,left:0,right:0,height:80,
          background:'linear-gradient(to top,rgba(0,0,0,.7),transparent)',
          display:'flex',alignItems:'center',justifyContent:'center',gap:1,px:2,overflow:'auto'}}>
        {imgs.map((img,i)=>(
          <Box key={i} onClick={()=>setIdx(i)} component="img" src={img} alt=""
            sx={{height:52,width:70,objectFit:'cover',borderRadius:1,cursor:'pointer',flexShrink:0,
              border:i===idx?'2.5px solid #fff':'2px solid rgba(255,255,255,.25)',
              opacity:i===idx?1:.55,transition:'all .2s'}}/>
        ))}
      </Box>}
      <Typography variant="caption" sx={{position:'absolute',bottom:imgs.length>1?90:16,
        left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.45)',whiteSpace:'nowrap',
        bgcolor:'rgba(0,0,0,.3)',px:2,py:.5,borderRadius:3}}>
        🖱️ Cuộn để zoom · Double-click phóng to
      </Typography>
    </Box>
  );
}

// ── PRODUCT CARD ──
function ProductCard({p,onOpen}){
  const cat   = catOf(p.cat||p.category);
  const isFree= p.free||p.isFree;
  const price = p.price||0;
  const op    = p.oldPrice||p.originalPrice||null;
  const disc  = op&&price?Math.round((1-price/op)*100):0;
  const dl    = p.dl||p.downloadCount||0;
  const imgs  = p.images&&p.images.length>0?p.images:null;
  return(
    <Card className="kbv-card" onClick={()=>onOpen(p)}
      sx={{height:'100%',display:'flex',flexDirection:'column',cursor:'pointer'}}>
      {/* Image */}
      <Box sx={{position:'relative',overflow:'hidden',paddingTop:'65%',bgcolor:'#0F172A'}}>
        {imgs
          ?<Box component="img" src={imgs[0]} alt={p.title}
              sx={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',
                transition:'transform .4s','&:hover':{transform:'scale(1.06)'}}}/>
          :<Box sx={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
              background:'linear-gradient(135deg,#0F172A,#1E3A5F)'}}>
            <i className={`fa-solid ${cat.fa}`} style={{fontSize:48,color:'rgba(59,130,246,.4)'}}/>
          </Box>
        }
        {/* Overlay gradient */}
        <Box sx={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(15,23,42,.5) 0%,transparent 50%)',pointerEvents:'none'}}/>
        {/* Category badge */}
        <Box sx={{position:'absolute',bottom:8,left:8}}>
          <Chip label={<><i className={`fa-solid ${cat.fa}`} style={{marginRight:4,fontSize:10}}/>{cat.label}</>}
            size="small" sx={{bgcolor:'rgba(15,23,42,.65)',color:cat.color,fontWeight:700,fontSize:10,backdropFilter:'blur(4px)'}}/>
        </Box>
        {/* Badges top */}
        <Box sx={{position:'absolute',top:8,left:8,display:'flex',flexDirection:'column',gap:.5}}>
          {isFree&&<Chip label="MIỄN PHÍ" size="small" color="success" sx={{fontSize:10,fontWeight:800,height:22}}/>}
          {!isFree&&p.isNew&&<Chip label="✦ MỚI" size="small" color="primary" sx={{fontSize:10,fontWeight:800,height:22}}/>}
          {!isFree&&(p.hot||p.isHot)&&<Chip label="🔥 HOT" size="small" color="error" sx={{fontSize:10,fontWeight:800,height:22}}/>}
        </Box>
        {disc>0&&<Chip label={`-${disc}%`} size="small" color="error"
          sx={{position:'absolute',top:8,right:8,fontSize:10,fontWeight:800,height:22}}/>}
        {/* Downloads */}
        <Typography variant="caption" sx={{position:'absolute',bottom:8,right:8,color:'rgba(255,255,255,.7)',fontSize:11}}>
          <FA icon="download" style={{marginRight:3}}/>{dl.toLocaleString()}
        </Typography>
      </Box>
      {/* Content */}
      <CardContent sx={{flex:1,p:2}}>
        <Typography variant="body2" sx={{fontWeight:700,color:'text.primary',lineHeight:1.5,mb:1,
          display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',minHeight:44}}>
          {p.title}
        </Typography>
        <Box sx={{display:'flex',alignItems:'center',justifyContent:'space-between',mt:'auto',pt:1.5,borderTop:'1px solid',borderColor:'divider'}}>
          <Box>
            {isFree
              ?<Typography variant="body1" sx={{fontWeight:800,color:'success.main'}}>Miễn phí</Typography>
              :<Box sx={{display:'flex',alignItems:'baseline',gap:.5}}>
                <Typography variant="body1" sx={{fontWeight:800,color:'primary.main'}}>{vnd(price)}</Typography>
                {op&&<Typography variant="caption" sx={{textDecoration:'line-through',color:'text.disabled'}}>{vnd(op)}</Typography>}
              </Box>
            }
          </Box>
          <Box sx={{display:'flex',alignItems:'center',gap:.3}}>
            <FA icon="star" style={{fontSize:11,color:'#F59E0B'}}/>
            <Typography variant="caption" sx={{fontWeight:600,color:'text.secondary'}}>{p.rate||p.rating||5}</Typography>
          </Box>
        </Box>
        {(p.fileCount||p.fc)>0&&<Typography variant="caption" sx={{color:'text.disabled',mt:.5,display:'block'}}>
          <FA icon="file" style={{marginRight:4}}/>{p.fileCount||p.fc} files
          {p.fileSize&&<> · {p.fileSize}</>}
        </Typography>}
      </CardContent>
    </Card>
  );
}

// ── NAVBAR ──

  const isMobile  = useMediaQuery(theme.breakpoints.down('md'));

    <AppBar position="sticky" elevation={0} sx={{bgcolor:'#0F172A',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <Container maxWidth="xl">
        <Toolbar sx={{gap:1,minHeight:{xs:56,md:64}}}>
          {/* Logo */}
          <Box onClick={()=>go('home')} sx={{display:'flex',alignItems:'center',gap:1.5,cursor:'pointer',flexShrink:0,mr:{md:3}}}>
            <Box sx={{width:36,height:36,borderRadius:2,background:'linear-gradient(135deg,#2563EB,#3B82F6)',
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <FA icon="drafting-compass" style={{color:'#fff',fontSize:18}}/>
            </Box>
            <Box sx={{display:{xs:'none',sm:'block'}}}>
              <Typography variant="subtitle1" sx={{fontWeight:900,color:'#fff',lineHeight:1,letterSpacing:-.3}}>
                KhoBanVe<span style={{color:'#3B82F6'}}>2D</span>
              </Typography>
              <Typography variant="caption" sx={{color:'rgba(255,255,255,.4)',fontSize:9,letterSpacing:1}}>
                THƯ VIỆN BẢN VẼ AUTOCAD
              </Typography>
            </Box>
          </Box>

          {/* Search Desktop */}
          {!isMobile&&(
            <TextField size="small" placeholder="Tìm bản vẽ, đồ án, hoa văn lazer..." value={query}
              onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&go('shop')}
              InputProps={{
                startAdornment:<InputAdornment position="start"><FA icon="magnifying-glass" style={{color:'#64748B',fontSize:14}}/></InputAdornment>,
                sx:{bgcolor:'rgba(255,255,255,.07)',color:'#fff',borderRadius:2,
                  '& fieldset':{borderColor:'rgba(255,255,255,.1)!important'},
                  '& input':{color:'#fff','&::placeholder':{color:'rgba(255,255,255,.35)'}},
                  '&:hover fieldset':{borderColor:'rgba(255,255,255,.25)!important'}},
              }}
              sx={{flex:1,maxWidth:480}}/>
          )}

          <Box sx={{flex:1}}/>

          {/* Search icon mobile */}
          {isMobile&&(
            <IconButton onClick={()=>setSearchOpen(s=>!s)} sx={{color:'rgba(255,255,255,.7)'}}>
              <FA icon="magnifying-glass" style={{fontSize:18}}/>
            </IconButton>
          )}

          {/* Nav links desktop */}
          {!isMobile&&<Stack direction="row" spacing={.5}>
            {[['home','Trang Chủ','house'],['shop','Kho Bản Vẽ','store']].map(([p,l,ic])=>(
              <Button key={p} onClick={()=>go(p)} startIcon={<FA icon={ic} style={{fontSize:14}}/>}
                sx={{color:page===p?'primary.light':'rgba(255,255,255,.6)',
                  bgcolor:page===p?'rgba(59,130,246,.12)':'transparent',
                  ':hover':{color:'#fff',bgcolor:'rgba(255,255,255,.07)'}}}>
                {l}
              </Button>
            ))}
          </Stack>}

          {/* Hamburger mobile */}
          {isMobile&&<IconButton onClick={()=>setDrawer(true)} sx={{color:'rgba(255,255,255,.7)'}}>
            <FA icon="bars" style={{fontSize:20}}/>
          </IconButton>}
        </Toolbar>

        {/* Mobile search bar */}
        {isMobile&&searchOpen&&(
          <Box sx={{px:1,pb:1}}>
            <TextField fullWidth size="small" placeholder="Tìm bản vẽ..." value={query}
              onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){go('shop');setSearchOpen(false);}}}
              InputProps={{
                startAdornment:<InputAdornment position="start"><FA icon="magnifying-glass" style={{color:'#64748B',fontSize:13}}/></InputAdornment>,
                sx:{bgcolor:'rgba(255,255,255,.08)',color:'#fff',borderRadius:2,
                  '& fieldset':{borderColor:'rgba(255,255,255,.1)!important'},
                  '& input':{color:'#fff','&::placeholder':{color:'rgba(255,255,255,.35)'}}},
              }} autoFocus/>
          </Box>
        )}
      </Container>
    </AppBar>

    {/* Mobile Drawer */}
    <Drawer anchor="right" open={drawer} onClose={()=>setDrawer(false)}
      PaperProps={{sx:{width:280,bgcolor:'#0F172A'}}}>
      <Box sx={{p:2}}>
        <Box sx={{display:'flex',alignItems:'center',gap:1.5,mb:3,pb:2,borderBottom:'1px solid rgba(255,255,255,.08)'}}>
          <Box sx={{width:32,height:32,borderRadius:1.5,background:'linear-gradient(135deg,#2563EB,#3B82F6)',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <FA icon="drafting-compass" style={{color:'#fff',fontSize:15}}/>
          </Box>
          <Typography sx={{fontWeight:900,color:'#fff'}}>KhoBanVe<span style={{color:'#3B82F6'}}>2D</span></Typography>
          <Box sx={{flex:1}}/>
          <IconButton onClick={()=>setDrawer(false)} size="small" sx={{color:'rgba(255,255,255,.5)'}}>
            <FA icon="xmark"/>

        </Box>

    if(!order)return;

  const doDownload = url=>{
    sessionStorage.setItem('dl_'+order.id,'done');

    if(!order||downloaded)return;
    (async()=>{

          <Typography variant="caption" color="text.secondary" gutterBottom sx={{display:'block'}}>
            <FA icon="box" style={{marginRight:4}}/> Đơn hàng

          <Alert severity="error" sx={{mb:2,borderRadius:2,textAlign:'left'}}>

            <Box sx={{mt:1}}><Button size="small" href="https://zalo.me/0913331916" target="_blank"
              startIcon={<FA icon="comment-dots"/>} sx={{color:'#0068FF'}}>Zalo: 0913331916</Button></Box>

        {downloaded&&!dlError&&(

function AdminLoginPage({onLogin}){
  const [pw,setPw]     = useState('');
  const [err,setErr]   = useState('');
  const [busy,setBusy] = useState(false);
  const submit = async()=>{
    setBusy(true);setErr('');
    try{
      const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(r.ok){sessionStorage.setItem('adminToken',d.token);onLogin(d.token);}
      else setErr(d.error||'Sai mật khẩu');
    }catch{setErr('Lỗi kết nối');}
    finally{setBusy(false);}
  };
  return(
    <Box sx={{minHeight:'100vh',background:'linear-gradient(135deg,#0F172A,#1E3A8A)',
      display:'flex',alignItems:'center',justifyContent:'center',p:2}}>
      <Paper elevation={0} sx={{p:{xs:4,md:5},maxWidth:400,width:'100%',borderRadius:4}} className="kbv-fadeup">
        <Box sx={{textAlign:'center',mb:4}}>
          <Box sx={{width:64,height:64,borderRadius:3,background:'linear-gradient(135deg,#2563EB,#3B82F6)',

            <FA icon="lock" style={{fontSize:26,color:'#fff'}}/>
          </Box>
          <Typography variant="h5" sx={{fontWeight:900}}>Admin KhoBanVe2D</Typography>
          <Typography variant="body2" color="text.secondary" sx={{mt:.5}}>Đăng nhập để quản lý bản vẽ</Typography>
        </Box>
        <TextField fullWidth type="password" label="Mật khẩu admin" value={pw}
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}

          sx={{mb:2}} size="small"/>

        <Button fullWidth variant="contained" size="large" onClick={submit} disabled={busy}

        </Button>
        <Box sx={{textAlign:'center'}}>
          <Button href="/" variant="text" size="small" startIcon={<FA icon="arrow-left" style={{fontSize:12}}/>}
            sx={{color:'text.disabled'}}>Về trang chủ</Button>
        </Box>
      </Paper>
    </Box>
  );
}

function ProductModal({prod,onClose,onSave,token}){
  const isEdit = !!prod?._id;
  const [form,setForm] = useState(prod||{
    title:'',code:'',category:'kien-truc',subcategory:'',description:'',
    fileType:'DWG AutoCAD',fileSize:'',fileCount:1,
    price:0,originalPrice:'',driveFileId:'',rating:5,downloadCount:0,
    isFree:false,isActive:true,isHot:false,isNew:false,images:[],
  });
  const [saving,setSaving]     = useState(false);
  const [uploading,setUploading] = useState(false);
  const [imgUrl,setImgUrl]     = useState('');
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));
  const uploadImg = async file=>{
    setUploading(true);
    try{
      const fd=new FormData();fd.append('file',file);fd.append('upload_preset','khobanve2d_unsigned');
      const r=await fetch('https://api.cloudinary.com/v1_1/vietlongbk123/image/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(d.secure_url)set('images',[...(form.images||[]),d.secure_url]);
      else alert('Upload thất bại: '+(d.error?.message||'Unknown'));
    }catch{alert('Lỗi upload ảnh');}
    finally{setUploading(false);}
  };
  const save = async()=>{
    if(!form.title)return alert('Vui lòng nhập tên bản vẽ');
    setSaving(true);
    try{
      const url=isEdit?`/api/products?id=${prod._id}`:'/api/products';
      const body={...form,price:Number(form.price)||0,originalPrice:form.originalPrice?Number(form.originalPrice):null,
        fileCount:Number(form.fileCount)||1,downloadCount:Number(form.downloadCount)||0,rating:parseFloat(form.rating)||5};
      const r=await fetch(url,{method:isEdit?'PUT':'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(body)});
      const d=await r.json();
      if(r.ok)onSave();
      else alert('Lỗi: '+(d.error||'Unknown'));
    }catch{alert('Lỗi kết nối');}
    finally{setSaving(false);}
  };
  const driveChange = e=>{
    const val=e.target.value.trim();
    const m=val.match(/\/d\/([a-zA-Z0-9_-]{20,})/)||val.match(/id=([a-zA-Z0-9_-]{20,})/)||val.match(/^([a-zA-Z0-9_-]{20,})$/);
    set('driveFileId',m?m[1]:val);

    <Dialog open fullWidth maxWidth="md" onClose={onClose} PaperProps={{sx:{borderRadius:3}}}>
      <DialogTitle sx={{display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:800,pb:0}}>

          {isEdit?'Sửa Bản Vẽ':'Thêm Bản Vẽ Mới'}
        </Box>
        <IconButton onClick={onClose} size="small"><FA icon="xmark"/></IconButton>
      </DialogTitle>
      <DialogContent dividers sx={{overflowY:'auto'}}>
        <Grid container spacing={2} sx={{mt:.5}}>
          <Grid item xs={12} sm={8}>
            <TextField fullWidth size="small" label="Tên bản vẽ *" value={form.title||''} onChange={e=>set('title',e.target.value)}/>
          </Grid>
          <Grid item xs={12} sm={4}>
            <TextField fullWidth size="small" label="Mã bản vẽ" value={form.code||''} onChange={e=>set('code',e.target.value)} placeholder="Để trống = tự động"/>
          </Grid>
          <Grid item xs={12} sm={6}>
            <FormControl fullWidth size="small">
              <InputLabel>Danh mục</InputLabel>
              <Select value={form.category||'kien-truc'} label="Danh mục" onChange={e=>set('category',e.target.value)}>
                {CATS.map(c=><MenuItem key={c.id} value={c.id}><i className={`fa-solid ${c.fa}`} style={{marginRight:8,color:c.color}}/>{c.label}</MenuItem>)}
              </Select>
            </FormControl>
          </Grid>
          <Grid item xs={12} sm={6}>
            <TextField fullWidth size="small" label="Thể loại con" value={form.subcategory||''} onChange={e=>set('subcategory',e.target.value)}/>
          </Grid>
          <Grid item xs={12}>
            <TextField fullWidth size="small" label="Mô tả" value={form.description||''} onChange={e=>set('description',e.target.value)} multiline rows={3}/>
          </Grid>
          <Grid item xs={4}><TextField fullWidth size="small" label="Loại file" value={form.fileType||''} onChange={e=>set('fileType',e.target.value)}/></Grid>
          <Grid item xs={4}><TextField fullWidth size="small" label="Dung lượng" value={form.fileSize||''} onChange={e=>set('fileSize',e.target.value)}/></Grid>
          <Grid item xs={4}><TextField fullWidth size="small" type="number" label="Số file" value={form.fileCount||1} onChange={e=>set('fileCount',e.target.value)}/></Grid>

            <TextField fullWidth size="small" label="Google Drive Link hoặc File ID" onChange={driveChange}
              defaultValue={form.driveFileId||''} placeholder="Paste link Drive hoặc File ID đều được"
              InputProps={{startAdornment:<InputAdornment position="start"><FA icon="brands fa-google-drive" style={{fontSize:13,color:'#4285F4'}}/></InputAdornment>}}/>
            {form.driveFileId&&!form.driveFileId.includes('/')&&(
              <Typography variant="caption" color="success.main" sx={{display:'flex',alignItems:'center',gap:.5,mt:.5}}>
                <FA icon="circle-check"/> File ID: <b>{form.driveFileId}</b>
              </Typography>
            )}
          </Grid>
          <Grid item xs={12}>
            <Stack direction="row" spacing={2} flexWrap="wrap">
              {[['isFree','Miễn phí'],['isActive','Hiển thị'],['isHot','🔥 Hot'],['isNew','✦ Mới']].map(([k,l])=>(
                <FormControlLabel key={k} control={<Checkbox checked={!!form[k]} onChange={e=>set(k,e.target.checked)} size="small"/>}
                  label={<Typography variant="body2" sx={{fontWeight:600}}>{l}</Typography>}/>
              ))}
            </Stack>
          </Grid>
          {/* Images */}
          <Grid item xs={12}>
            <Typography variant="subtitle2" sx={{fontWeight:700,mb:1}}>
              <FA icon="images" style={{marginRight:6,color:'#2563EB'}}/> Ảnh demo ({(form.images||[]).length} ảnh)
            </Typography>
            <Stack direction="row" spacing={1} flexWrap="wrap" sx={{mb:1.5,gap:1}}>
              {(form.images||[]).map((url,i)=>(
                <Box key={i} sx={{position:'relative',width:80,height:60,borderRadius:1.5,overflow:'hidden',
                  border:'1.5px solid',borderColor:'divider',flexShrink:0}}>
                  <Box component="img" src={url} alt="" sx={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  <IconButton size="small" onClick={()=>set('images',(form.images||[]).filter((_,j)=>j!==i))}
                    sx={{position:'absolute',top:1,right:1,bgcolor:'rgba(239,68,68,.9)',color:'#fff',
                      width:18,height:18,'& .fa-xmark':{fontSize:10}}}>
                    <FA icon="xmark" style={{fontSize:10}}/>
                  </IconButton>
                </Box>
              ))}
            </Stack>
            <Stack direction={{xs:'column',sm:'row'}} spacing={1}>
              <Button component="label" variant="outlined" size="small" disabled={uploading}
                startIcon={uploading?<CircularProgress size={13}/>:<FA icon="cloud-arrow-up" style={{fontSize:13}}/>}>
                {uploading?'Đang upload...':'Upload ảnh (Cloudinary)'}
                <input type="file" accept="image/*" multiple hidden onChange={e=>{for(const f of e.target.files)uploadImg(f);e.target.value='';}} disabled={uploading}/>
              </Button>
              <TextField size="small" value={imgUrl} onChange={e=>setImgUrl(e.target.value)}
                placeholder="Hoặc paste URL ảnh..." sx={{flex:1}}
                InputProps={{endAdornment:<InputAdornment position="end">
                  <IconButton size="small" onClick={()=>{if(imgUrl.trim()){set('images',[...(form.images||[]),imgUrl.trim()]);setImgUrl('');}}} >
                    <FA icon="plus" style={{fontSize:12}}/>
                  </IconButton>
                </InputAdornment>}}/>
            </Stack>
          </Grid>
        </Grid>
      </DialogContent>
      <DialogActions sx={{p:2.5}}>
        <Button onClick={onClose} variant="outlined" sx={{color:'text.secondary',borderColor:'divider'}}>Hủy</Button>
        <Button onClick={save} disabled={saving} variant="contained" size="large"
          startIcon={saving?<CircularProgress size={15} color="inherit"/>:<FA icon={isEdit?'floppy-disk':'plus'} style={{fontSize:14}}/>}>
          {saving?'Đang lưu...':(isEdit?'Lưu Thay Đổi':'Thêm Bản Vẽ')}
        </Button>
      </DialogActions>
    </Dialog>
  );
}

// ── BATCH UPLOAD TAB ──
function BatchUploadTab({token}){
  const [files,setFiles]     = useState([]);
  const [cat,setCat]         = useState('kien-truc');
  const [defPrice,setDefPrice] = useState(0);
  const [rows,setRows]       = useState([]);
  const [busy,setBusy]       = useState(false);
  const [creating,setCreating] = useState(false);
  const [done,setDone]       = useState([]);
  const [step,setStep]       = useState(1);
  const fmt = b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'kB':(b/1048576).toFixed(1)+'MB';
  const doTranslate = filename=>{
    const clean=filename.replace(/\.(zip|rar|7z|dwg|dxf|pdf|skp|exe)$/i,'').replace(/[_\-\.]+/g,' ').replace(/\bfree\s*download\b/gi,'').replace(/\bcad\b/gi,'').replace(/\bfile\b/gi,'').replace(/\s+/g,' ').trim();
    return fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q='+encodeURIComponent(clean)).then(r=>r.json()).then(d=>d[0]?.map(x=>x[0]).filter(Boolean).join('')||clean);
  };
  const start=()=>{
    if(!files.length)return alert('Chưa chọn file!');
    setBusy(true);setStep(2);
    const nr=Array.from(files).map(f=>({file:f,filename:f.name,title:'',translating:true,cat,price:defPrice,fileType:f.name.split('.').pop().toUpperCase(),fileSize:fmt(f.size),driveFileId:''}));
    setRows([...nr]);
    (async()=>{
      for(let i=0;i<nr.length;i++){
        try{nr[i].title=await doTranslate(nr[i].filename);}
        catch{nr[i].title=nr[i].filename.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ');}
        nr[i].translating=false;setRows([...nr]);
        if(i<nr.length-1)await new Promise(r=>setTimeout(r,300));
      }
      setBusy(false);
    })();
  };
  const upd=(i,k,v)=>{const r=[...rows];r[i]={...r[i],[k]:v};setRows(r);};
  const createAll=async()=>{
    setCreating(true);const res=[];
    for(const row of rows){
      try{
        const r=await fetch('/api/products',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body:JSON.stringify({title:row.title,category:row.cat,fileType:row.fileType,fileSize:row.fileSize,fileCount:1,price:Number(row.price)||0,driveFileId:row.driveFileId||'',isActive:false,isNew:true,downloadCount:0,rating:5})});
        const d=await r.json();
        res.push({title:row.title,ok:r.ok,error:d.error});
      }catch(e){res.push({title:row.title,ok:false,error:e.message});}
    }
    setDone(res);setCreating(false);setStep(3);
  };
  return(<Box>
    {/* Step 1 */}
    <Paper elevation={0} sx={{p:3,borderRadius:3,border:'1px solid',borderColor:'divider',mb:2}}>
      <Typography variant="h6" sx={{fontWeight:800,mb:2.5}}>
        <FA icon="cloud-arrow-up" style={{marginRight:8,color:'#2563EB'}}/> Bước 1 — Chọn File & Danh Mục
      </Typography>
      <Grid container spacing={2} sx={{mb:2}}>
        <Grid item xs={12} sm={5}>
          <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}>
            <FA icon="folder-open" style={{marginRight:5}}/> Chọn nhiều file
          </Typography>
          <Button variant="outlined" component="label" fullWidth startIcon={<FA icon="upload" style={{fontSize:13}}/>}>
            Chọn File (.zip, .rar, .dwg...)
            <input type="file" hidden multiple accept=".zip,.rar,.7z,.dwg,.dxf,.pdf,.skp" onChange={e=>{setFiles(e.target.files);setRows([]);setStep(1);}}/>
          </Button>
          {files.length>0&&<Typography variant="caption" color="success.main" sx={{display:'block',mt:.7}}>
            <FA icon="circle-check" style={{marginRight:4}}/> Đã chọn {files.length} file
          </Typography>}
        </Grid>
        <Grid item xs={6} sm={4}>
          <FormControl fullWidth size="small">
            <InputLabel>Danh mục mặc định</InputLabel>
            <Select value={cat} label="Danh mục mặc định" onChange={e=>setCat(e.target.value)}>
              {CATS.map(c=><MenuItem key={c.id} value={c.id}><i className={`fa-solid ${c.fa}`} style={{marginRight:8,color:c.color}}/>{c.label}</MenuItem>)}
            </Select>
          </FormControl>
        </Grid>
        <Grid item xs={6} sm={3}>
          <TextField fullWidth size="small" type="number" label="Giá mặc định (đ)" value={defPrice} onChange={e=>setDefPrice(Number(e.target.value))}/>
        </Grid>
      </Grid>
      <Button variant="contained" size="large" onClick={start} disabled={!files.length||busy}
        startIcon={busy?<CircularProgress size={16} color="inherit"/>:<FA icon="language" style={{fontSize:16}}/>}
        sx={{background:'linear-gradient(135deg,#7C3AED,#9333EA)',':hover':{background:'linear-gradient(135deg,#6D28D9,#7C3AED)'}}}>
        {busy?'Đang dịch...':'🌐 Dịch Tên & Xem Trước'}
      </Button>
    </Paper>
    {/* Step 2 */}
    {rows.length>0&&step===2&&(
    <Paper elevation={0} sx={{borderRadius:3,border:'1px solid',borderColor:'divider',mb:2,overflow:'hidden'}}>
      <Box sx={{px:3,py:2,borderBottom:'1px solid',borderColor:'divider',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <Typography variant="h6" sx={{fontWeight:800}}>
          <FA icon="pen-to-square" style={{marginRight:8,color:'#2563EB'}}/> Bước 2 — Xem Trước ({rows.length} sản phẩm)
        </Typography>
        <Typography variant="caption" color="text.secondary">Chỉnh sửa trước khi tạo</Typography>
      </Box>
      <TableContainer>
        <Table size="small">
          <TableHead><TableRow sx={{bgcolor:'rgba(0,0,0,.02)'}}>
            {['#','Tên file','Tiêu đề tiếng Việt','Danh mục','Giá (đ)','Drive File ID',''].map(h=>(
              <TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</TableCell>
            ))}
          </TableRow></TableHead>
          <TableBody>{rows.map((row,i)=>(
            <TableRow key={i} hover>
              <TableCell sx={{color:'text.disabled',fontWeight:700,width:30}}>{i+1}</TableCell>
              <TableCell sx={{maxWidth:160}}>
                <Typography variant="caption" sx={{fontFamily:'monospace',color:'text.secondary',wordBreak:'break-all',display:'block'}}>{row.filename}</Typography>
                <Typography variant="caption" color="text.disabled">{row.fileSize}</Typography>
              </TableCell>
              <TableCell sx={{minWidth:220}}>
                {row.translating
                  ?<Box sx={{display:'flex',alignItems:'center',gap:1}}><CircularProgress size={14}/><Typography variant="caption" color="secondary">Đang dịch...</Typography></Box>
                  :<TextField size="small" fullWidth value={row.title} onChange={e=>upd(i,'title',e.target.value)} variant="outlined" sx={{'& .MuiInputBase-input':{fontSize:12,py:.7}}}/>
                }
              </TableCell>
              <TableCell sx={{minWidth:140}}>
                <FormControl size="small" fullWidth>
                  <Select value={row.cat} onChange={e=>upd(i,'cat',e.target.value)} sx={{'& .MuiSelect-select':{py:.7,fontSize:12}}}>
                    {CATS.map(c=><MenuItem key={c.id} value={c.id} sx={{fontSize:12}}>{c.emoji} {c.label}</MenuItem>)}
                  </Select>
                </FormControl>
              </TableCell>
              <TableCell sx={{minWidth:100}}><TextField size="small" type="number" value={row.price} onChange={e=>upd(i,'price',e.target.value)} sx={{'& .MuiInputBase-input':{fontSize:12,py:.7}}}/></TableCell>
              <TableCell sx={{minWidth:170}}><TextField size="small" value={row.driveFileId} onChange={e=>upd(i,'driveFileId',e.target.value)} placeholder="File ID..." sx={{'& .MuiInputBase-input':{fontSize:11,py:.7,fontFamily:'monospace'}}}/></TableCell>
              <TableCell><IconButton size="small" color="error" onClick={()=>setRows(rows.filter((_,j)=>j!==i))}><FA icon="trash" style={{fontSize:12}}/></IconButton></TableCell>
            </TableRow>
          ))}</TableBody>
        </Table>
      </TableContainer>
      <Box sx={{px:3,py:2,borderTop:'1px solid',borderColor:'divider',bgcolor:'rgba(0,0,0,.02)',
        display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:1}}>
        <Typography variant="caption" color="text.secondary">
          <FA icon="circle-info" style={{marginRight:4}}/> Sản phẩm sẽ tạo ở trạng thái <b>Ẩn</b> — bật lên sau khi review
        </Typography>
        <Button variant="contained" color="success" size="large" onClick={createAll} disabled={creating||busy}
          startIcon={creating?<CircularProgress size={15} color="inherit"/>:<FA icon="plus" style={{fontSize:14}}/>}>
          {creating?'Đang tạo...':'Tạo '+rows.length+' Sản Phẩm'}
        </Button>
      </Box>
    </Paper>)}
    {/* Step 3 */}
    {step===3&&done.length>0&&(
    <Paper elevation={0} sx={{p:3,borderRadius:3,border:'1px solid',borderColor:'divider'}}>
      <Typography variant="h6" sx={{fontWeight:800,mb:2}}>
        <FA icon="circle-check" style={{marginRight:8,color:'#059669'}}/> Kết Quả
      </Typography>
      <Stack direction="row" spacing={2} sx={{mb:2.5}}>
        <Paper elevation={0} sx={{p:2,borderRadius:2,bgcolor:'rgba(5,150,105,.06)',border:'1px solid rgba(5,150,105,.2)',textAlign:'center',minWidth:100}}>
          <Typography variant="h5" sx={{fontWeight:900,color:'success.main'}}>{done.filter(d=>d.ok).length}</Typography>
          <Typography variant="caption" color="text.secondary">Thành công</Typography>
        </Paper>
        {done.filter(d=>!d.ok).length>0&&<Paper elevation={0} sx={{p:2,borderRadius:2,bgcolor:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.2)',textAlign:'center',minWidth:100}}>
          <Typography variant="h5" sx={{fontWeight:900,color:'error.main'}}>{done.filter(d=>!d.ok).length}</Typography>
          <Typography variant="caption" color="text.secondary">Thất bại</Typography>
        </Paper>}
      </Stack>
      {done.map((d,i)=>(
        <Box key={i} sx={{display:'flex',gap:1,py:.8,borderBottom:'1px dashed',borderColor:'divider',alignItems:'center'}}>
          <FA icon={d.ok?'circle-check':'circle-xmark'} style={{color:d.ok?'#059669':'#EF4444',fontSize:14,flexShrink:0}}/>
          <Typography variant="body2" sx={{flex:1,color:d.ok?'text.primary':'error.main'}}>{d.title}</Typography>
          {!d.ok&&<Typography variant="caption" color="error.main">{d.error}</Typography>}
        </Box>
      ))}
      <Alert severity="warning" sx={{mt:2,borderRadius:2}} icon={<FA icon="lightbulb" style={{fontSize:16}}/>}>
        <b>Bước tiếp theo:</b> Vào tab Sản Phẩm → thêm ảnh + Drive ID + giá → bật Hiển thị
      </Alert>
      <Button sx={{mt:2}} variant="outlined" startIcon={<FA icon="rotate-left" style={{fontSize:13}}/>}
        onClick={()=>{setStep(1);setFiles([]);setRows([]);setDone([]);}}>
        Upload tiếp
      </Button>
    </Paper>)}
  </Box>);
}

// ── ADMIN DASHBOARD ──
function AdminDashboard({token,onLogout}){
  const [tab,setTab]       = useState(0);
  const [prods,setProds]   = useState([]);
  const [loading,setLoading] = useState(true);
  const [modal,setModal]   = useState(null);
  const [deleting,setDeleting] = useState(null);
  const [search,setSearch] = useState('');
  const [catF,setCatF]     = useState('all');
  const isMobile = useMediaQuery(theme.breakpoints.down('md'));
  const load=async(silent=false)=>{
    if(!silent)setLoading(true);
    try{const r=await fetch('/api/products?admin=1',{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();if(Array.isArray(d))setProds(d);}
    catch{}finally{if(!silent)setLoading(false);}
  };
  useEffect(()=>{load();const iv=setInterval(()=>load(true),30000);return()=>clearInterval(iv);},[]);
  const del=async(id,title)=>{
    if(!confirm(`Xóa "${title}"?`))return;
    setDeleting(id);
    try{const r=await fetch(`/api/products?id=${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});if(r.ok)load();}
    finally{setDeleting(null);}
  };
  const filtered=prods.filter(p=>{
    const mc=catF==='all'||p.category===catF;
    const mq=!search||p.title?.toLowerCase().includes(search.toLowerCase())||p.code?.toLowerCase().includes(search.toLowerCase());
    return mc&&mq;
  });
  const totalDl=prods.reduce((s,p)=>s+(p.downloadCount||0),0);
  const paidProds=prods.filter(p=>!p.isFree&&p.price>0);
  const totalRev=paidProds.reduce((s,p)=>s+(p.downloadCount||0)*p.price,0);
  const topProds=[...prods].sort((a,b)=>(b.downloadCount||0)-(a.downloadCount||0));
  const STATS=[
    {n:prods.length,l:'Tổng bản vẽ',fa:'box-open',c:'primary'},
    {n:totalDl.toLocaleString('vi-VN'),l:'Tổng lượt tải',fa:'download',c:'success'},
    {n:vnd(totalRev),l:'Doanh thu ước tính',fa:'sack-dollar',c:'warning'},
    {n:prods.filter(p=>p.isFree).length,l:'Sản phẩm miễn phí',fa:'gift',c:'secondary'},
  ];
  return(<Box sx={{minHeight:'100vh',bgcolor:'background.default'}}>
    {/* Header */}
    <AppBar position="sticky" elevation={0} sx={{bgcolor:'#0F172A',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <Toolbar sx={{gap:1}}>
        <Box sx={{display:'flex',alignItems:'center',gap:1.5,flex:1}}>
          <Box sx={{width:32,height:32,borderRadius:1.5,background:'linear-gradient(135deg,#2563EB,#3B82F6)',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <FA icon="drafting-compass" style={{color:'#fff',fontSize:15}}/>
          </Box>
          <Typography sx={{fontWeight:900,color:'#fff',fontSize:15}}>
            KhoBanVe<span style={{color:'#3B82F6'}}>2D</span>
            <Box component="span" sx={{color:'rgba(255,255,255,.4)',fontSize:11,fontWeight:400,ml:1}}>Admin Panel</Box>
          </Typography>
        </Box>
        <Button href="/" target="_blank" size="small" startIcon={<FA icon="arrow-up-right-from-square" style={{fontSize:11}}/>}
          sx={{color:'rgba(255,255,255,.5)',display:{xs:'none',sm:'flex'}}}>Website</Button>
        <Button onClick={onLogout} variant="contained" color="error" size="small"
          startIcon={<FA icon="right-from-bracket" style={{fontSize:11}}/>}>
          {isMobile?'':'Đăng xuất'}
        </Button>
      </Toolbar>
    </AppBar>
    <Container maxWidth="xl" sx={{py:3}}>
      {/* Stats */}
      <Grid container spacing={2} sx={{mb:3}}>
        {STATS.map(s=>(
          <Grid item xs={6} md={3} key={s.l}>
            <Paper elevation={0} sx={{p:2.5,borderRadius:3,border:'1px solid',borderColor:'divider',
              borderLeft:'4px solid',borderLeftColor:`${s.c}.main`}}>
              <Box sx={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <Box>
                  <Typography variant="caption" color="text.secondary" sx={{fontWeight:600,display:'block',mb:.5}}>{s.l}</Typography>
                  <Typography variant="h5" sx={{fontWeight:900,color:'text.primary'}}>{s.n}</Typography>
                </Box>
                <Box sx={{width:40,height:40,borderRadius:2,bgcolor:`rgba(0,0,0,.04)`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <FA icon={s.fa} style={{fontSize:18,color:s.c==='primary'?'#2563EB':s.c==='success'?'#059669':s.c==='warning'?'#F59E0B':'#7C3AED'}}/>
                </Box>
              </Box>
            </Paper>
          </Grid>
        ))}
      </Grid>
      {/* Tabs */}
      <Paper elevation={0} sx={{borderRadius:3,border:'1px solid',borderColor:'divider',overflow:'hidden'}}>
        <Tabs value={tab} onChange={(_,v)=>setTab(v)} sx={{borderBottom:'1px solid',borderColor:'divider',bgcolor:'rgba(0,0,0,.01)'}}>
          <Tab icon={<FA icon="box-open" style={{fontSize:14}}/>} iconPosition="start" label="Sản Phẩm"/>
          <Tab icon={<FA icon="chart-bar" style={{fontSize:14}}/>} iconPosition="start" label="Doanh Thu & Lượt Tải"/>
          <Tab icon={<FA icon="cloud-arrow-up" style={{fontSize:14}}/>} iconPosition="start" label="Upload Hàng Loạt"/>
        </Tabs>
        <Box sx={{p:{xs:2,md:3}}}>
          {/* Tab 0: Products */}
          {tab===0&&<>
            <Box sx={{display:'flex',gap:1.5,mb:2,flexWrap:'wrap'}}>
              <TextField size="small" placeholder="Tìm tên, mã..." value={search}
                onChange={e=>setSearch(e.target.value)} sx={{flex:1,minWidth:200}}
                InputProps={{startAdornment:<InputAdornment position="start"><FA icon="magnifying-glass" style={{fontSize:13,color:'#94A3B8'}}/></InputAdornment>}}/>
              <FormControl size="small" sx={{minWidth:160}}>
                <Select value={catF} onChange={e=>setCatF(e.target.value)} displayEmpty>
                  <MenuItem value="all">Tất cả danh mục</MenuItem>
                  {CATS.map(c=><MenuItem key={c.id} value={c.id}><i className={`fa-solid ${c.fa}`} style={{marginRight:8,color:c.color}}/>{c.label}</MenuItem>)}
                </Select>
              </FormControl>
              <Button variant="outlined" onClick={()=>load()} startIcon={<FA icon="rotate" style={{fontSize:13}}/>}>Làm mới</Button>
              <Button variant="contained" onClick={()=>setModal('add')} startIcon={<FA icon="plus" style={{fontSize:13}}/>}>Thêm bản vẽ</Button>
            </Box>
            {loading
              ?<Box sx={{textAlign:'center',py:6}}><CircularProgress/></Box>
              :filtered.length===0
                ?<Box sx={{textAlign:'center',py:8}}><FA icon="box-open" style={{fontSize:48,color:'#CBD5E1'}}/><Typography color="text.disabled" sx={{mt:1}}>Chưa có bản vẽ nào</Typography></Box>
                :<TableContainer>
                  <Table>
                    <TableHead><TableRow sx={{bgcolor:'rgba(0,0,0,.02)'}}>
                      {['#','Mã','Tên Bản Vẽ','Danh Mục','Giá','📥','Files','Trạng thái',''].map(h=>(
                        <TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</TableCell>
                      ))}
                    </TableRow></TableHead>
                    <TableBody>{filtered.map((p,i)=>{
                      const cat=catOf(p.category);
                      return(<TableRow key={p._id} hover>
                        <TableCell sx={{color:'text.disabled',fontWeight:700,fontSize:12,width:32}}>{i+1}</TableCell>
                        <TableCell sx={{fontFamily:'monospace',fontSize:11,color:'text.secondary'}}>{p.code||'—'}</TableCell>
                        <TableCell sx={{maxWidth:240}}>
                          <Box sx={{display:'flex',alignItems:'center',gap:1}}>
                            {p.images?.[0]&&<Box component="img" src={p.images[0]} sx={{width:38,height:28,borderRadius:1,objectFit:'cover',flexShrink:0}}/>}
                            <Box>
                              <Typography variant="body2" sx={{fontWeight:600,lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{p.title}</Typography>
                              {p.subcategory&&<Typography variant="caption" color="text.disabled">{p.subcategory}</Typography>}
                            </Box>
                          </Box>
                        </TableCell>
                        <TableCell><Chip label={<><i className={`fa-solid ${cat.fa}`} style={{fontSize:10,marginRight:4}}/>{cat.label}</>} size="small" sx={{bgcolor:cat.bg,color:cat.color,fontWeight:700}}/></TableCell>
                        <TableCell sx={{whiteSpace:'nowrap'}}>
                          {p.isFree?<Typography variant="body2" color="success.main" sx={{fontWeight:700}}>Miễn phí</Typography>
                            :<Typography variant="body2" color="primary.main" sx={{fontWeight:700}}>{vnd(p.price||0)}</Typography>}
                        </TableCell>
                        <TableCell><Chip label={<><FA icon="download" style={{fontSize:9,marginRight:3}}/>{(p.downloadCount||0).toLocaleString()}</>} size="small" sx={{bgcolor:'rgba(2,132,199,.08)',color:'#0284C7',fontWeight:700}}/></TableCell>
                        <TableCell sx={{fontSize:12,color:'text.secondary'}}>{p.fileCount||0}</TableCell>
                        <TableCell><Chip label={p.isActive?'Hiển thị':'Ẩn'} size="small" color={p.isActive?'success':'error'} variant="outlined" sx={{fontWeight:600}}/></TableCell>
                        <TableCell>
                          <Stack direction="row" spacing={.5}>
                            <IconButton size="small" onClick={()=>setModal(p)} sx={{color:'primary.main',bgcolor:'rgba(37,99,235,.06)'}}><FA icon="pen-to-square" style={{fontSize:13}}/></IconButton>
                            <IconButton size="small" onClick={()=>del(p._id,p.title)} disabled={deleting===p._id} sx={{color:'error.main',bgcolor:'rgba(239,68,68,.06)'}}>{deleting===p._id?<CircularProgress size={12}/>:<FA icon="trash" style={{fontSize:13}}/>}</IconButton>
                          </Stack>
                        </TableCell>
                      </TableRow>);
                    })}</TableBody>
                  </Table>
                </TableContainer>
            }
            <Typography variant="caption" color="text.disabled" sx={{display:'block',textAlign:'center',mt:1.5}}>{filtered.length} bản vẽ • tổng {prods.length}</Typography>
          </>}
          {/* Tab 1: Revenue */}
          {tab===1&&<>
            <Grid container spacing={2} sx={{mb:3}}>
              {[
                ['sack-dollar','Doanh thu ước tính',vnd(totalRev),'lượt tải × giá','#EA580C'],
                ['download','Tổng lượt tải',totalDl.toLocaleString('vi-VN'),'tất cả sản phẩm','#0284C7'],
                ['trophy',`Top: ${topProds[0]?.title?.slice(0,20)||'—'}`,`${topProds[0]?.downloadCount||0} lượt`,'bán chạy nhất','#059669'],
                ['boxes-stacked',`${paidProds.length} sp có phí`,'Sản phẩm','có giá bán','#7C3AED'],
              ].map(([ic,l,v,sub,c])=>(
                <Grid item xs={6} md={3} key={l}>
                  <Paper elevation={0} sx={{p:2,borderRadius:2,border:'1px solid',borderColor:'divider',borderTop:`3px solid ${c}`}}>
                    <Box sx={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <Box>
                        <Typography variant="caption" color="text.secondary" sx={{fontWeight:600,display:'block',mb:.3}}>{l}</Typography>
                        <Typography variant="h6" sx={{fontWeight:800,color:'text.primary'}}>{v}</Typography>
                        <Typography variant="caption" color="text.disabled">{sub}</Typography>
                      </Box>
                      <FA icon={ic} style={{fontSize:24,color:c}}/>
                    </Box>
                  </Paper>
                </Grid>
              ))}
            </Grid>
            <Box sx={{display:'flex',justifyContent:'space-between',mb:1.5}}>
              <Typography variant="subtitle1" sx={{fontWeight:800}}>
                <FA icon="chart-bar" style={{marginRight:8,color:'#2563EB'}}/> Chi Tiết Lượt Tải
              </Typography>
              <Button size="small" startIcon={<FA icon="rotate" style={{fontSize:12}}/>} onClick={()=>load()}>Làm mới</Button>
            </Box>
            <TableContainer>
              <Table>
                <TableHead><TableRow sx={{bgcolor:'rgba(0,0,0,.02)'}}>
                  {['#','Tên Bản Vẽ','Danh Mục','Giá','Lượt Tải','Doanh Thu Ước Tính'].map(h=>(
                    <TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',letterSpacing:.4}}>{h}</TableCell>
                  ))}
                </TableRow></TableHead>
                <TableBody>{topProds.map((p,i)=>{
                  const cat=catOf(p.category);const dl=p.downloadCount||0;const rev=p.isFree?0:dl*(p.price||0);
                  const pct=totalDl>0?Math.round(dl/totalDl*100):0;
                  return(<TableRow key={p._id} hover>
                    <TableCell sx={{fontWeight:700,color:'text.disabled',width:36}}>{i+1}</TableCell>
                    <TableCell sx={{maxWidth:260}}>
                      <Typography variant="body2" sx={{fontWeight:600,lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{p.title}</Typography>
                      <Box sx={{mt:.5,display:'flex',alignItems:'center',gap:.5}}>
                        <LinearProgress variant="determinate" value={pct} sx={{flex:1,height:3,borderRadius:2,bgcolor:'rgba(0,0,0,.06)','& .MuiLinearProgress-bar':{bgcolor:'primary.main'}}}/>
                        <Typography variant="caption" color="text.disabled" sx={{fontSize:10}}>{pct}%</Typography>
                      </Box>
                    </TableCell>
                    <TableCell><Chip label={<><i className={`fa-solid ${cat.fa}`} style={{fontSize:10,marginRight:4}}/>{cat.label}</>} size="small" sx={{bgcolor:cat.bg,color:cat.color,fontWeight:700}}/></TableCell>
                    <TableCell sx={{whiteSpace:'nowrap'}}>{p.isFree?<Typography variant="body2" color="success.main" sx={{fontWeight:700}}>Miễn phí</Typography>:<Typography variant="body2" color="primary.main" sx={{fontWeight:700}}>{vnd(p.price||0)}</Typography>}</TableCell>
                    <TableCell><Chip label={dl.toLocaleString()} size="small" sx={{bgcolor:'rgba(2,132,199,.08)',color:'#0284C7',fontWeight:800}}/></TableCell>
                    <TableCell sx={{fontWeight:700,color:rev>0?'success.main':'text.disabled'}}>{rev>0?vnd(rev):'—'}</TableCell>
                  </TableRow>);
                })}</TableBody>
              </Table>
            </TableContainer>
            <Typography variant="caption" color="text.disabled" sx={{display:'block',mt:1,textAlign:'right'}}>
              * Doanh thu ước tính = lượt tải × giá niêm yết
            </Typography>
          </>}
          {/* Tab 2: Batch */}
          {tab===2&&<BatchUploadTab token={token}/>}
        </Box>
      </Paper>
    </Container>
    {/* Product Modal */}
    {modal&&<ProductModal prod={modal==='add'?null:modal} token={token} onClose={()=>setModal(null)} onSave={()=>{setModal(null);load();}}/>}
  </Box>);
}

// ── ADMIN PAGE ──
function AdminPage(){
  const [token,setToken] = useState(()=>sessionStorage.getItem('adminToken')||'');
  const logout=()=>{sessionStorage.removeItem('adminToken');setToken('');};
  if(!token) return <AdminLoginPage onLogin={setToken}/>;
  return <AdminDashboard token={token} onLogout={logout}/>;
}

// ── APP ──
function App(){
  if(window.location.pathname.startsWith('/admin')) return <AdminPage/>;
  const [page,setPage]         = useState('home');
  const [catFilter,setCatFilter] = useState('all');
  const [query,setQuery]       = useState('');
  const [prod,setProd]         = useState(null);
  const [order,setOrder]       = useState(null);
  const [payState,setPayState] = useState('waiting');
  const {prods}                = useProducts();
  const isMobile               = useMediaQuery(theme.breakpoints.down('sm'));
  const [botNav,setBotNav]     = useState(0);
  const go = useCallback((p,data=null)=>{
    if(data)setProd(data);
    setPage(p);window.scrollTo(0,0);
    if(p==='home')setBotNav(0);if(p==='shop')setBotNav(1);
  },[]);
  const buy = useCallback(p=>{
    const oid=genOid();setOrder({id:oid,prod:p});setPayState('waiting');setPage('pay');window.scrollTo(0,0);
  },[]);
  return(
    <ThemeProvider theme={theme}>
      <CssBaseline/>
      <NavBar page={page} go={go} query={query} setQuery={setQuery}/>
      <Box component="main" sx={{pb:{xs:7,sm:0}}}>
        {page==='home'&&<HomePage go={go} prods={prods}/>}
        {page==='shop'&&<ShopPage go={go} prods={prods} catFilter={catFilter} setCatFilter={setCatFilter} query={query} setQuery={setQuery} buy={buy}/>}
        {page==='detail'&&<DetailPage prod={prod} go={go} buy={buy} prods={prods}/>}
        {page==='pay'&&<PayPage order={order} payState={payState} setPayState={setPayState} go={go}/>}
        {page==='success'&&<SuccessPage order={order} go={go}/>}
      </Box>
      {/* Bottom nav mobile */}
      {isMobile&&page!=='pay'&&page!=='success'&&(
        <Paper elevation={4} sx={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,borderTop:'1px solid',borderColor:'divider'}}>
          <BottomNavigation value={botNav} onChange={(_,v)=>{setBotNav(v);go(v===0?'home':'shop');}}>
            <BottomNavigationAction label="Trang Chủ" icon={<FA icon="house" style={{fontSize:18}}/>}/>
            <BottomNavigationAction label="Kho Bản Vẽ" icon={<FA icon="store" style={{fontSize:18}}/>}/>
          </BottomNavigation>
        </Paper>
      )}
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
