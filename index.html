  return createTheme({
    palette:{
      mode,
      primary:{main:'#2563EB',light:'#3B82F6',dark:'#1D4ED8',contrastText:'#fff'},

// ══ UTILS ══
const vnd = n => (Number(n)||0).toLocaleString('vi-VN')+'đ';
const genOid = () => 'KBV'+Date.now().toString(36).toUpperCase().slice(-6);
const fmtBytes = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'kB':(b/1048576).toFixed(1)+'MB';
const timeAgo = d => {
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return 'vừa xong';
  if(s<3600) return Math.floor(s/60)+' phút trước';
  if(s<86400) return Math.floor(s/3600)+' giờ trước';
  if(s<2592000) return Math.floor(s/86400)+' ngày trước';
  return new Date(d).toLocaleDateString('vi-VN');
};

// ══ DATA HOOKS ══
function useProducts(){
  const [prods,setProds]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch('/api/products').then(r=>r.ok?r.json():null).then(data=>{
      if(data&&Array.isArray(data)&&data.length>0){
        setProds(data.map(p=>({
          id:p._id,_id:p._id,cat:p.category,title:p.title,price:p.price,
          oldPrice:p.originalPrice||null,desc:p.description,images:p.images||[],
          ft:p.fileType,fc:p.fileCount||0,fileCount:p.fileCount||0,fileSize:p.fileSize,
          dl:p.downloadCount||0,downloadCount:p.downloadCount||0,rate:p.rating||5,rev:p.reviewCount||0,
          free:!!p.isFree,isFree:!!p.isFree,hot:p.isHot||false,isHot:p.isHot||false,isNew:p.isNew||false,
          tags:p.tags||[],code:p.code,subcategory:p.subcategory,
        })));
      }
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);
  return {prods,loading};
}

function useArticles(){
  const [arts,setArts]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch('/api/articles').then(r=>r.ok?r.json():null).then(d=>{
      if(d&&Array.isArray(d)) setArts(d);
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);
  return {arts,loading};
}
// ══ LIGHTBOX ══
function Lightbox({imgs,startIdx,onClose}){
  const [idx,setIdx]=useState(startIdx||0);
  const [zoom,setZoom]=useState(1);
  const [pos,setPos]=useState({x:0,y:0});
  const [drag,setDrag]=useState(false);
  const [ds,setDs]=useState({x:0,y:0});
  useEffect(()=>{setZoom(1);setPos({x:0,y:0});},[idx]);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape'){if(zoom>1){setZoom(1);setPos({x:0,y:0});}else onClose();}
      if(e.key==='ArrowRight'&&zoom===1)setIdx(i=>Math.min(i+1,imgs.length-1));
      if(e.key==='ArrowLeft'&&zoom===1)setIdx(i=>Math.max(i-1,0));
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[zoom,imgs.length]);
  const onWheel=e=>{e.preventDefault();const d=e.deltaY>0?-.3:.3;setZoom(z=>Math.max(1,Math.min(5,z+d)));};
  const onMD=e=>{if(zoom<=1)return;e.preventDefault();setDrag(true);setDs({x:e.clientX-pos.x,y:e.clientY-pos.y});};
  const onMM=e=>{if(!drag)return;setPos({x:e.clientX-ds.x,y:e.clientY-ds.y});};
  return(
    <Box onClick={onClose} sx={{position:'fixed',inset:0,bgcolor:'rgba(0,0,0,.93)',zIndex:3000,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      cursor:zoom>1?(drag?'grabbing':'grab'):'default'}}
      onMouseMove={onMM} onMouseUp={()=>setDrag(false)} onMouseLeave={()=>setDrag(false)}>
      <Box sx={{position:'absolute',top:0,left:0,right:0,height:56,background:'linear-gradient(to bottom,rgba(0,0,0,.7),transparent)',
        display:'flex',alignItems:'center',justifyContent:'space-between',px:2,zIndex:1}} onClick={e=>e.stopPropagation()}>
        <Stack direction="row" spacing={1} alignItems="center">
          <IconButton onClick={()=>{setZoom(z=>Math.max(1,z-.5));if(zoom-.5<=1)setPos({x:0,y:0});}} size="small" sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}}><FA icon="minus" style={{fontSize:14}}/></IconButton>
          <Typography variant="caption" sx={{color:'#fff',fontWeight:700,minWidth:44,textAlign:'center'}}>{Math.round(zoom*100)}%</Typography>
          <IconButton onClick={()=>setZoom(z=>Math.min(5,z+.5))} size="small" sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}}><FA icon="plus" style={{fontSize:14}}/></IconButton>
        </Stack>
        {imgs.length>1&&<Typography variant="caption" sx={{color:'rgba(255,255,255,.7)',fontWeight:600}}>{idx+1}/{imgs.length}</Typography>}
        <IconButton onClick={onClose} sx={{color:'#fff',bgcolor:'rgba(255,255,255,.1)'}} size="small"><FA icon="xmark"/></IconButton>
      </Box>
      <Box sx={{flex:1,width:'100%',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}} onWheel={onWheel}>
        <img src={imgs[idx]} alt="" onMouseDown={onMD}
          onDoubleClick={()=>{if(zoom===1)setZoom(2.5);else{setZoom(1);setPos({x:0,y:0});}}}
          style={{maxWidth:'100vw',maxHeight:'calc(100vh - 136px)',objectFit:'contain',
            transform:`scale(${zoom}) translate(${pos.x/zoom}px,${pos.y/zoom}px)`,transformOrigin:'center',
            transition:drag?'none':'transform .15s ease',cursor:zoom>1?(drag?'grabbing':'grab'):'zoom-in',
            userSelect:'none',display:'block'}} draggable={false}/>
      </Box>
      {idx>0&&zoom===1&&<IconButton onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}} size="large" sx={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#fff',bgcolor:'rgba(255,255,255,.12)'}}><FA icon="chevron-left"/></IconButton>}
      {idx<imgs.length-1&&zoom===1&&<IconButton onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}} size="large" sx={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#fff',bgcolor:'rgba(255,255,255,.12)'}}><FA icon="chevron-right"/></IconButton>}
      {imgs.length>1&&<Box onClick={e=>e.stopPropagation()} sx={{position:'absolute',bottom:0,left:0,right:0,height:80,background:'linear-gradient(to top,rgba(0,0,0,.7),transparent)',display:'flex',alignItems:'center',justifyContent:'center',gap:1,px:2,overflow:'auto'}}>
        {imgs.map((img,i)=><Box key={i} onClick={()=>setIdx(i)} component="img" src={img} sx={{height:52,width:70,objectFit:'cover',borderRadius:1,cursor:'pointer',flexShrink:0,border:i===idx?'2.5px solid #fff':'2px solid rgba(255,255,255,.25)',opacity:i===idx?1:.55}}/>)}
      </Box>}
    </Box>
  );
}

        </Box>

        <Box sx={{position:'absolute',bottom:8,right:8,bgcolor:'rgba(15,23,42,.55)',borderRadius:1,px:.8,py:.2,backdropFilter:'blur(6px)'}}>
          <Typography sx={{color:'#fff',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:.4}}><FA icon="download" style={{fontSize:10}}/>{dl.toLocaleString()}</Typography>

        <Typography sx={{fontWeight:700,fontSize:14,lineHeight:1.45,mb:1,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',minHeight:40}}>{p.title}</Typography>

function ShopPage({go,prods,catFilter,setCatFilter,query,setQuery,buy}){
  const isMobile=useMediaQuery(t=>t.breakpoints.down('md'));
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [sort,setSort]=useState('newest');
  const cntByCat=useMemo(()=>{const m={};prods.forEach(p=>{const c=p.cat||p.category;m[c]=(m[c]||0)+1;});return m;},[prods]);
  let filtered=useMemo(()=>prods.filter(p=>{
    const mc=(catFilter==='all')||(p.cat||p.category)===catFilter;
    const mq=!query||p.title?.toLowerCase().includes(query.toLowerCase());
    return mc&&mq;
  }),[prods,catFilter,query]);
  filtered=[...filtered].sort((a,b)=>{
    if(sort==='price-low')return (a.price||0)-(b.price||0);
    if(sort==='price-high')return (b.price||0)-(a.price||0);
    if(sort==='popular')return (b.dl||0)-(a.dl||0);
    return 0;
  });
  const Sidebar=()=>(
    <Box sx={{width:{xs:280,md:'auto'}}}>
      <Typography variant="subtitle2" sx={{fontWeight:800,mb:2,px:{xs:2,md:0},pt:{xs:2,md:0}}}><FA icon="filter" style={{marginRight:8,color:'#2563EB'}}/>DANH MỤC</Typography>
      <List dense disablePadding>
        {[{id:'all',label:'Tất cả',i8:'list',color:'#2563EB',count:prods.length},...CATS.map(c=>({...c,count:cntByCat[c.id]||0}))].map(cat=>(
          <ListItemButton key={cat.id} selected={catFilter===cat.id} onClick={()=>{setCatFilter(cat.id);if(isMobile)setDrawerOpen(false);}}
            sx={{borderRadius:1,mb:.5,px:1.5,'&.Mui-selected':{bgcolor:alpha(cat.color,.12),color:cat.color},':hover':{bgcolor:alpha(cat.color,.06)}}}>
            <ListItemText primary={cat.label} primaryTypographyProps={{fontSize:13,fontWeight:catFilter===cat.id?700:500}}/>
            <Chip label={cat.count} size="small" sx={{height:20,fontSize:10,minWidth:28,bgcolor:catFilter===cat.id?cat.color:'action.hover',color:catFilter===cat.id?'#fff':'text.secondary'}}/>
          </ListItemButton>
        ))}
      </List>
    </Box>
  );
  return(<Box>
    <Box sx={{position:'relative',height:{xs:120,md:180},overflow:'hidden'}}>
      <Box component="img" src="https://images.unsplash.com/photo-1542621334-a254cf47733d?w=1600&q=80" alt="Kho bản vẽ"
        sx={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/>
      <Box sx={{position:'absolute',inset:0,background:'linear-gradient(120deg,rgba(10,22,40,.92) 0%,rgba(15,42,107,.75) 55%,rgba(10,22,40,.5) 100%)'}}/>
      <Container maxWidth="xl" sx={{position:'relative',height:'100%',display:'flex',alignItems:'center'}}>
        <Box>
          <Typography variant={isMobile?'h5':'h4'} sx={{color:'#fff',fontWeight:900}}>Kho Bản Vẽ</Typography>
          <Typography variant="body2" sx={{color:'rgba(255,255,255,.7)'}}>{prods.length} bản vẽ & đồ án đang chờ bạn khám phá</Typography>
        </Box>
      </Container>
    </Box>
    <Container maxWidth="xl" sx={{py:{xs:2,md:4}}}>
    <Box sx={{display:{xs:'flex',md:'none'},gap:1,mb:2}}>
      <TextField fullWidth size="small" placeholder="Tìm bản vẽ..." value={query} onChange={e=>setQuery(e.target.value)}
        InputProps={{startAdornment:<InputAdornment position="start"><FA icon="magnifying-glass" style={{fontSize:13,color:'#94A3B8'}}/></InputAdornment>}}/>
      <Button variant="outlined" startIcon={<FA icon="filter" style={{fontSize:13}}/>} onClick={()=>setDrawerOpen(true)} sx={{flexShrink:0}}>Lọc</Button>
    </Box>
    <Grid container spacing={3}>
      <Grid item md={2.5} sx={{display:{xs:'none',md:'block'}}}>
        <Paper elevation={0} sx={{p:2,borderRadius:1.5,border:'1px solid',borderColor:'divider',position:'sticky',top:88}}><Sidebar/></Paper>
      </Grid>
      <Grid item xs={12} md={9.5}>
        <Box sx={{display:'flex',justifyContent:'space-between',alignItems:'center',mb:2,gap:1,flexWrap:'wrap'}}>
          <Typography variant="body2" color="text.secondary"><FA icon="box-open" style={{marginRight:6}}/>Tìm thấy <b>{filtered.length}</b> bản vẽ{catFilter!=='all'&&<> trong <b>{CATS.find(c=>c.id===catFilter)?.label}</b></>}</Typography>
          <FormControl size="small" sx={{minWidth:160}}>
            <Select value={sort} onChange={e=>setSort(e.target.value)}>
              <MenuItem value="newest">Mới nhất</MenuItem>
              <MenuItem value="popular">Phổ biến nhất</MenuItem>
              <MenuItem value="price-low">Giá thấp → cao</MenuItem>
              <MenuItem value="price-high">Giá cao → thấp</MenuItem>
            </Select>
          </FormControl>
        </Box>
        {filtered.length===0
          ?<Box sx={{textAlign:'center',py:10}}><EmptyStateSVG style={{margin:'0 auto'}} size={140}/><Typography variant="h6" color="text.secondary" sx={{mt:2}}>Không tìm thấy bản vẽ phù hợp</Typography></Box>
          :<Grid container spacing={2.5}>{filtered.map(p=><Grid item xs={6} sm={6} lg={4} key={p.id||p._id}><ProductCard p={p} onOpen={x=>go('detail',x)}/></Grid>)}</Grid>}
      </Grid>
    </Grid>
    <Drawer anchor="left" open={drawerOpen} onClose={()=>setDrawerOpen(false)}>
      <Box sx={{p:2,display:'flex',justifyContent:'flex-end'}}><IconButton onClick={()=>setDrawerOpen(false)} size="small"><FA icon="xmark"/></IconButton></Box>
      <Box sx={{px:2,pb:2}}><Sidebar/></Box>
    </Drawer>
    </Container>
  </Box>);
}

// ══ RICH TEXT EDITOR — soạn có định dạng, hiển thị đúng WYSIWYG ══
function RichTextEditor({value,onChange,onUploadImage,placeholder}){
  const ref=useRef(null);
  const [uploading,setUploading]=useState(false);
  const didInit=useRef(false);

  useEffect(()=>{
    if(!didInit.current && ref.current){
      ref.current.innerHTML = value || '';
      didInit.current = true;
    }
  },[]);

  const exec=(cmd,val=null)=>{
    if(ref.current) ref.current.focus();
    document.execCommand(cmd,false,val);
    if(ref.current) onChange(ref.current.innerHTML);
  };

  const handleInput=()=>{ if(ref.current) onChange(ref.current.innerHTML); };

  const doInsertImage=async(file)=>{
    if(ref.current) ref.current.focus();
    setUploading(true);
    try{
      const url=await onUploadImage(file);
      document.execCommand('insertHTML',false,`<img src="${url}" alt="" style="max-width:100%;border-radius:8px;margin:16px 0;display:block;"/>`);
      if(ref.current) onChange(ref.current.innerHTML);
    }catch(err){ alert('Lỗi chèn ảnh: '+err.message); }
    finally{ setUploading(false); }
  };

  const handlePaste=(e)=>{
    const items=e.clipboardData?.items;
    let imageFile=null;
    if(items){ for(const item of items){ if(item.type.startsWith('image/')){ imageFile=item.getAsFile(); break; } } }
    e.preventDefault();
    if(imageFile){ doInsertImage(imageFile); return; }
    const text=e.clipboardData.getData('text/plain');
    document.execCommand('insertText',false,text);
    if(ref.current) onChange(ref.current.innerHTML);
  };

  const insertLink=()=>{
    const url=prompt('Nhập URL liên kết:');
    if(url) exec('createLink',url);
  };

  const TOOLS=[
    {ic:'bold',cmd:'bold',tip:'Đậm (Ctrl+B)'},
    {ic:'italic',cmd:'italic',tip:'Nghiêng (Ctrl+I)'},
    {ic:'underline',cmd:'underline',tip:'Gạch chân'},
    {sep:1},
    {label:'H2',cmd:'formatBlock',val:'<H2>',tip:'Tiêu đề lớn'},
    {label:'H3',cmd:'formatBlock',val:'<H3>',tip:'Tiêu đề nhỏ'},
    {label:'P',cmd:'formatBlock',val:'<P>',tip:'Đoạn văn thường'},
    {sep:1},
    {ic:'list-ul',cmd:'insertUnorderedList',tip:'Danh sách chấm'},
    {ic:'list-ol',cmd:'insertOrderedList',tip:'Danh sách số'},
    {ic:'quote-left',cmd:'formatBlock',val:'<BLOCKQUOTE>',tip:'Trích dẫn'},
    {sep:1},
    {ic:'align-left',cmd:'justifyLeft',tip:'Căn trái'},
    {ic:'align-center',cmd:'justifyCenter',tip:'Căn giữa'},
    {sep:1},
    {ic:'link',cmd:'__link',tip:'Chèn liên kết'},
    {ic:'eraser',cmd:'removeFormat',tip:'Xóa định dạng'},
  ];

  return(
    <Box>
      <Box sx={{display:'flex',flexWrap:'wrap',alignItems:'center',gap:.2,p:.6,border:'1px solid',borderColor:'divider',borderBottom:'none',borderRadius:'6px 6px 0 0',bgcolor:'action.hover'}}>
        {TOOLS.map((t,i)=> t.sep
          ? <Divider key={i} orientation="vertical" flexItem sx={{mx:.4,my:.6}}/>
          : <Tooltip key={i} title={t.tip}>
              <IconButton size="small" onMouseDown={e=>e.preventDefault()}
                onClick={()=>{ if(t.cmd==='__link') insertLink(); else exec(t.cmd,t.val); }}
                sx={{width:30,height:30,borderRadius:1}}>
                {t.label?<Typography sx={{fontSize:11,fontWeight:800}}>{t.label}</Typography>:<FA icon={t.ic} style={{fontSize:13}}/>}
              </IconButton>
            </Tooltip>
        )}
        <Box sx={{flex:1}}/>
        <Tooltip title="Chèn ảnh từ máy">
          <IconButton size="small" component="label" sx={{width:30,height:30,borderRadius:1}}>
            <FA icon="image" style={{fontSize:13}}/>
            <input type="file" hidden accept="image/*" onChange={e=>{const f=e.target.files[0]; if(f) doInsertImage(f); e.target.value='';}}/>
          </IconButton>
        </Tooltip>
      </Box>
      <Box sx={{position:'relative'}}>
        <Box ref={ref} contentEditable suppressContentEditableWarning
          onInput={handleInput} onPaste={handlePaste} data-placeholder={placeholder}
          sx={{
            minHeight:240,maxHeight:480,overflowY:'auto',p:1.75,
            border:'1px solid',borderColor:'divider',borderRadius:'0 0 6px 6px',
            fontFamily:"'Be Vietnam Pro',sans-serif",fontSize:14.5,lineHeight:1.7,outline:'none',
            '&:focus':{borderColor:'primary.main'},
            '&:empty:before':{content:'attr(data-placeholder)',color:'text.disabled'},
            '& p':{mb:1.5},
            '& h2':{fontWeight:800,fontSize:'1.4em',mt:2,mb:1},
            '& h3':{fontWeight:700,fontSize:'1.2em',mt:1.5,mb:1},
            '& img':{maxWidth:'100%',borderRadius:1,my:1.5,display:'block'},
            '& ul,& ol':{pl:3,mb:1.5},
            '& li':{mb:.5},

function ImagePasteZone({images,setImages}){
  const [uploading,setUploading]=useState(0);
  const [dragOver,setDragOver]=useState(false);
  const [imgUrl,setImgUrl]=useState('');
  const zoneRef=useRef(null);

  const uploadFile=async(file)=>{
    setUploading(u=>u+1);
    try{
      const fd=new FormData();fd.append('file',file);fd.append('upload_preset','khobanve2d_unsigned');
      const r=await fetch('https://api.cloudinary.com/v1_1/vietlongbk123/image/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(d.secure_url){setImages(prev=>[...prev,d.secure_url]);}
      else alert('Upload thất bại: '+(d.error?.message||'Unknown'));
    }catch{alert('Lỗi upload ảnh');}
    finally{setUploading(u=>u-1);}
  };

  // Paste handler — chấp nhận nhiều ảnh từ clipboard
  const handlePaste=useCallback((e)=>{
    const items=e.clipboardData?.items;
    if(!items)return;
    let found=false;
    for(const item of items){
      if(item.type.startsWith('image/')){
        const file=item.getAsFile();
        if(file){found=true;uploadFile(file);}
      }
    }
    if(found)e.preventDefault();
  },[]);

  // Lắng nghe paste toàn cục khi zone đang focus/hover
  useEffect(()=>{
    const zone=zoneRef.current;
    if(!zone)return;
    zone.addEventListener('paste',handlePaste);
    return()=>zone.removeEventListener('paste',handlePaste);
  },[handlePaste]);

  const onDrop=(e)=>{
    e.preventDefault();setDragOver(false);
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    files.forEach(uploadFile);
  };

  return(
    <Box>
      <Typography variant="subtitle2" sx={{fontWeight:700,mb:1}}><FA icon="images" style={{marginRight:6,color:'#2563EB'}}/>Ảnh demo ({images.length} ảnh)</Typography>

      {/* Existing images */}
      {images.length>0&&<Stack direction="row" spacing={1} flexWrap="wrap" sx={{mb:1.5,gap:1}}>
        {images.map((url,i)=>(
          <Box key={i} sx={{position:'relative',width:88,height:66,borderRadius:.75,overflow:'hidden',border:'1.5px solid',borderColor:'divider',flexShrink:0}}>
            <Box component="img" src={url} sx={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <IconButton size="small" onClick={()=>setImages(images.filter((_,j)=>j!==i))} sx={{position:'absolute',top:1,right:1,bgcolor:'rgba(239,68,68,.92)',color:'#fff',width:20,height:20,':hover':{bgcolor:'#DC2626'}}}><FA icon="xmark" style={{fontSize:10}}/></IconButton>
            <Chip label={i+1} size="small" sx={{position:'absolute',bottom:2,left:2,height:16,fontSize:9,bgcolor:'rgba(15,23,42,.7)',color:'#fff'}}/>
          </Box>
        ))}
      </Stack>}

      {/* PASTE ZONE */}
      <Box ref={zoneRef} tabIndex={0}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={onDrop}
        sx={{border:'2px dashed',borderColor:dragOver?'primary.main':'divider',borderRadius:1.25,
          p:3,textAlign:'center',cursor:'pointer',transition:'all .2s',outline:'none',
          bgcolor:dragOver?'rgba(37,99,235,.06)':'action.hover',mb:1.5,
          ':hover':{borderColor:'primary.main',bgcolor:'rgba(37,99,235,.04)'},
          ':focus':{borderColor:'primary.main',boxShadow:'0 0 0 3px rgba(37,99,235,.15)'}}}>
        <Box sx={{mb:1,display:'flex',justifyContent:'center'}}><I8 name="clipboard" size={40}/></Box>
        <Typography variant="body2" sx={{fontWeight:700,mb:.5}}>
          Click vào đây rồi <Box component="kbd" sx={{px:.8,py:.2,bgcolor:'action.selected',borderRadius:1,fontFamily:'monospace',fontSize:12,mx:.3}}>Ctrl+V</Box> để dán ảnh
        </Typography>
        <Typography variant="caption" color="text.secondary">
          Chụp màn hình (Win+Shift+S) → click vào ô này → Ctrl+V · Hỗ trợ nhiều ảnh · Hoặc kéo thả ảnh vào đây
        </Typography>
        {uploading>0&&<Box sx={{mt:1.5,display:'flex',alignItems:'center',justifyContent:'center',gap:1}}><CircularProgress size={14}/><Typography variant="caption" color="primary">Đang upload {uploading} ảnh...</Typography></Box>}
      </Box>

      {/* Upload from file + URL */}
      <Stack direction={{xs:'column',sm:'row'}} spacing={1}>
        <Button component="label" variant="outlined" size="small" startIcon={<FA icon="folder-open" style={{fontSize:13}}/>}>
          Chọn từ máy
          <input type="file" accept="image/*" multiple hidden onChange={e=>{Array.from(e.target.files).forEach(uploadFile);e.target.value='';}}/>
        </Button>
        <TextField size="small" value={imgUrl} onChange={e=>setImgUrl(e.target.value)} placeholder="Hoặc paste URL ảnh..." sx={{flex:1}}
          InputProps={{endAdornment:<InputAdornment position="end"><IconButton size="small" onClick={()=>{if(imgUrl.trim()){setImages([...images,imgUrl.trim()]);setImgUrl('');}}}><FA icon="plus" style={{fontSize:12}}/></IconButton></InputAdornment>}}/>
      </Stack>
    </Box>
  );
}

function ProductModal({prod,onClose,onSave,token}){
  const isEdit=!!prod?._id;
  const [form,setForm]=useState(prod||{title:'',code:'',category:'kien-truc',subcategory:'',description:'',fileType:'DWG AutoCAD',fileSize:'',fileCount:1,price:0,originalPrice:'',driveFileId:'',rating:5,downloadCount:0,isFree:false,isActive:true,isHot:false,isNew:false,images:[]});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setImages=(imgs)=>setForm(f=>({...f,images:typeof imgs==='function'?imgs(f.images||[]):imgs}));
  const save=async()=>{
    if(!form.title)return alert('Vui lòng nhập tên bản vẽ');
    setSaving(true);
    try{
      const url=isEdit?`/api/products?id=${prod._id}`:'/api/products';
      const body={...form,price:Number(form.price)||0,originalPrice:form.originalPrice?Number(form.originalPrice):null,fileCount:Number(form.fileCount)||1,downloadCount:Number(form.downloadCount)||0,rating:parseFloat(form.rating)||5};
      const r=await fetch(url,{method:isEdit?'PUT':'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(body)});
      const d=await r.json();if(r.ok)onSave();else alert('Lỗi: '+(d.error||'Unknown'));
    }catch{alert('Lỗi kết nối');}finally{setSaving(false);}
  };
  const driveChange=e=>{const val=e.target.value.trim();const m=val.match(/\/d\/([a-zA-Z0-9_-]{20,})/)||val.match(/id=([a-zA-Z0-9_-]{20,})/)||val.match(/^([a-zA-Z0-9_-]{20,})$/);set('driveFileId',m?m[1]:val);};
  return(
    <Dialog open fullWidth maxWidth="md" onClose={onClose} PaperProps={{sx:{borderRadius:1.5}}}>
      <DialogTitle sx={{display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:800,pb:0}}>
        <Box sx={{display:'flex',alignItems:'center',gap:1}}><FA icon={isEdit?'pen-to-square':'plus-circle'} style={{color:'#2563EB'}}/>{isEdit?'Sửa Bản Vẽ':'Thêm Bản Vẽ Mới'}</Box>
        <IconButton onClick={onClose} size="small"><FA icon="xmark"/></IconButton>
      </DialogTitle>
      <DialogContent dividers>
        <Grid container spacing={2} sx={{mt:.5}}>
          <Grid item xs={12} sm={8}><TextField fullWidth size="small" label="Tên bản vẽ *" value={form.title||''} onChange={e=>set('title',e.target.value)}/></Grid>
          <Grid item xs={12} sm={4}><TextField fullWidth size="small" label="Mã bản vẽ" value={form.code||''} onChange={e=>set('code',e.target.value)} placeholder="Tự động"/></Grid>
          <Grid item xs={12} sm={6}><FormControl fullWidth size="small"><InputLabel>Danh mục</InputLabel><Select value={form.category||'kien-truc'} label="Danh mục" onChange={e=>set('category',e.target.value)}>{CATS.map(c=><MenuItem key={c.id} value={c.id}><I8 name={c.i8} size={16} style={{marginRight:8,verticalAlign:'-3px'}}/>{c.label}</MenuItem>)}</Select></FormControl></Grid>
          <Grid item xs={12} sm={6}><TextField fullWidth size="small" label="Thể loại con" value={form.subcategory||''} onChange={e=>set('subcategory',e.target.value)}/></Grid>
          <Grid item xs={12}><TextField fullWidth size="small" label="Mô tả" value={form.description||''} onChange={e=>set('description',e.target.value)} multiline rows={3}/></Grid>
          <Grid item xs={4}><TextField fullWidth size="small" label="Loại file" value={form.fileType||''} onChange={e=>set('fileType',e.target.value)}/></Grid>
          <Grid item xs={4}><TextField fullWidth size="small" label="Dung lượng" value={form.fileSize||''} onChange={e=>set('fileSize',e.target.value)}/></Grid>
          <Grid item xs={4}><TextField fullWidth size="small" type="number" label="Số file" value={form.fileCount||1} onChange={e=>set('fileCount',e.target.value)}/></Grid>
          <Grid item xs={6}><TextField fullWidth size="small" type="number" label="Giá (đ)" value={form.price||0} onChange={e=>set('price',e.target.value)}/></Grid>
          <Grid item xs={6}><TextField fullWidth size="small" type="number" label="Giá gốc (đ)" value={form.originalPrice||''} onChange={e=>set('originalPrice',e.target.value)}/></Grid>
          <Grid item xs={6}><TextField fullWidth size="small" type="number" label="📥 Lượt tải" value={form.downloadCount||0} onChange={e=>set('downloadCount',e.target.value)}/></Grid>
          <Grid item xs={6}><TextField fullWidth size="small" type="number" label="⭐ Đánh giá (1-5)" value={form.rating||5} inputProps={{min:1,max:5,step:.1}} onChange={e=>set('rating',e.target.value)}/></Grid>
          <Grid item xs={12}><TextField fullWidth size="small" label="Google Drive Link hoặc File ID" onChange={driveChange} defaultValue={form.driveFileId||''} placeholder="Paste link Drive hoặc File ID"/>
            {form.driveFileId&&!form.driveFileId.includes('/')&&<Typography variant="caption" color="success.main" sx={{display:'flex',alignItems:'center',gap:.5,mt:.5}}><FA icon="circle-check"/>File ID: <b>{form.driveFileId}</b></Typography>}</Grid>
          <Grid item xs={12}><Stack direction="row" spacing={2} flexWrap="wrap">{[['isFree','Miễn phí'],['isActive','Hiển thị'],['isHot','🔥 Hot'],['isNew','✦ Mới']].map(([k,l])=>(<FormControlLabel key={k} control={<Checkbox checked={!!form[k]} onChange={e=>set(k,e.target.checked)} size="small"/>} label={<Typography variant="body2" sx={{fontWeight:600}}>{l}</Typography>}/>))}</Stack></Grid>
          <Grid item xs={12}><Divider sx={{my:.5}}/></Grid>
          <Grid item xs={12}><ImagePasteZone images={form.images||[]} setImages={setImages}/></Grid>
        </Grid>
      </DialogContent>
      <DialogActions sx={{p:2.5}}>
        <Button onClick={onClose} variant="outlined" sx={{color:'text.secondary',borderColor:'divider'}}>Hủy</Button>

      </DialogActions>
    </Dialog>
  );
}

function BatchUploadTab({token}){
  const [files,setFiles]=useState([]);const [cat,setCat]=useState('kien-truc');const [defPrice,setDefPrice]=useState(0);
  const [rows,setRows]=useState([]);const [busy,setBusy]=useState(false);const [creating,setCreating]=useState(false);const [done,setDone]=useState([]);const [step,setStep]=useState(1);
  const fmt=b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'kB':(b/1048576).toFixed(1)+'MB';
  const doTranslate=filename=>{const clean=filename.replace(/\.(zip|rar|7z|dwg|dxf|pdf|skp|exe)$/i,'').replace(/[_\-\.]+/g,' ').replace(/\bfree\s*download\b/gi,'').replace(/\bcad\b/gi,'').replace(/\bfile\b/gi,'').replace(/\s+/g,' ').trim();
    return fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q='+encodeURIComponent(clean)).then(r=>r.json()).then(d=>d[0]?.map(x=>x[0]).filter(Boolean).join('')||clean);};
  const start=()=>{if(!files.length)return alert('Chưa chọn file!');setBusy(true);setStep(2);
    const nr=Array.from(files).map(f=>({file:f,filename:f.name,title:'',translating:true,cat,price:defPrice,fileType:f.name.split('.').pop().toUpperCase(),fileSize:fmt(f.size),driveFileId:''}));setRows([...nr]);
    (async()=>{for(let i=0;i<nr.length;i++){try{nr[i].title=await doTranslate(nr[i].filename);}catch{nr[i].title=nr[i].filename.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ');}nr[i].translating=false;setRows([...nr]);if(i<nr.length-1)await new Promise(r=>setTimeout(r,300));}setBusy(false);})();};
  const upd=(i,k,v)=>{const r=[...rows];r[i]={...r[i],[k]:v};setRows(r);};
  const createAll=async()=>{setCreating(true);const res=[];for(const row of rows){try{const r=await fetch('/api/products',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({title:row.title,category:row.cat,fileType:row.fileType,fileSize:row.fileSize,fileCount:1,price:Number(row.price)||0,driveFileId:row.driveFileId||'',isActive:false,isNew:true,downloadCount:0,rating:5})});const d=await r.json();res.push({title:row.title,ok:r.ok,error:d.error});}catch(e){res.push({title:row.title,ok:false,error:e.message});}}setDone(res);setCreating(false);setStep(3);};
  return(<Box>
    <Paper elevation={0} sx={{p:3,borderRadius:1.5,border:'1px solid',borderColor:'divider',mb:2}}>
      <Typography variant="h6" sx={{fontWeight:800,mb:2.5}}><FA icon="cloud-arrow-up" style={{marginRight:8,color:'#2563EB'}}/>Bước 1 — Chọn File & Danh Mục</Typography>
      <Grid container spacing={2} sx={{mb:2}} alignItems="flex-start">
        <Grid item xs={12} sm={5}>
          <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}><FA icon="folder-open" style={{marginRight:5}}/>Chọn nhiều file</Typography>
          <Button variant="outlined" component="label" fullWidth startIcon={<FA icon="upload" style={{fontSize:13}}/>} sx={{height:40}}>Chọn File (.zip, .rar, .dwg...)<input type="file" hidden multiple accept=".zip,.rar,.7z,.dwg,.dxf,.pdf,.skp" onChange={e=>{setFiles(e.target.files);setRows([]);setStep(1);}}/></Button>
          {files.length>0&&<Typography variant="caption" color="success.main" sx={{display:'block',mt:.7}}><FA icon="circle-check" style={{marginRight:4}}/>Đã chọn {files.length} file</Typography>}
        </Grid>
        <Grid item xs={6} sm={4}>
          <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}><FA icon="folder" style={{marginRight:5}}/>Danh mục mặc định</Typography>
          <FormControl fullWidth size="small"><Select value={cat} onChange={e=>setCat(e.target.value)} sx={{height:40}}>{CATS.map(c=><MenuItem key={c.id} value={c.id}><I8 name={c.i8} size={16} style={{marginRight:8,verticalAlign:'-3px'}}/>{c.label}</MenuItem>)}</Select></FormControl>
        </Grid>
        <Grid item xs={6} sm={3}>
          <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}><FA icon="sack-dollar" style={{marginRight:5}}/>Giá mặc định (đ)</Typography>
          <TextField fullWidth size="small" type="number" value={defPrice} onChange={e=>setDefPrice(Number(e.target.value))} sx={{'& .MuiInputBase-root':{height:40}}}/>
        </Grid>
      </Grid>
      <Button variant="contained" size="large" onClick={start} disabled={!files.length||busy} startIcon={busy?<CircularProgress size={16} color="inherit"/>:<FA icon="language" style={{fontSize:16}}/>} sx={{background:GRAD.primarySoft}}>{busy?'Đang dịch...':'🌐 Dịch Tên & Xem Trước'}</Button>
    </Paper>
    {rows.length>0&&step===2&&<Paper elevation={0} sx={{borderRadius:1.5,border:'1px solid',borderColor:'divider',mb:2,overflow:'hidden'}}>
      <Box sx={{px:3,py:2,borderBottom:'1px solid',borderColor:'divider',display:'flex',justifyContent:'space-between',alignItems:'center'}}><Typography variant="h6" sx={{fontWeight:800}}><FA icon="pen-to-square" style={{marginRight:8,color:'#2563EB'}}/>Bước 2 — Xem Trước ({rows.length})</Typography></Box>
      <TableContainer><Table size="small"><TableHead><TableRow sx={{bgcolor:'action.hover'}}>{['#','Tên file','Tiêu đề tiếng Việt','Danh mục','Giá (đ)','Drive File ID',''].map(h=><TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</TableCell>)}</TableRow></TableHead>
        <TableBody>{rows.map((row,i)=>(<TableRow key={i} hover>
          <TableCell sx={{color:'text.disabled',fontWeight:700,width:30}}>{i+1}</TableCell>
          <TableCell sx={{maxWidth:160}}><Typography variant="caption" sx={{fontFamily:'monospace',color:'text.secondary',wordBreak:'break-all',display:'block'}}>{row.filename}</Typography><Typography variant="caption" color="text.disabled">{row.fileSize}</Typography></TableCell>
          <TableCell sx={{minWidth:220}}>{row.translating?<Box sx={{display:'flex',alignItems:'center',gap:1}}><CircularProgress size={14}/><Typography variant="caption" color="secondary">Đang dịch...</Typography></Box>:<TextField size="small" fullWidth value={row.title} onChange={e=>upd(i,'title',e.target.value)} sx={{'& .MuiInputBase-input':{fontSize:12,py:.7}}}/>}</TableCell>
          <TableCell sx={{minWidth:140}}><FormControl size="small" fullWidth><Select value={row.cat} onChange={e=>upd(i,'cat',e.target.value)} sx={{'& .MuiSelect-select':{py:.7,fontSize:12}}}>{CATS.map(c=><MenuItem key={c.id} value={c.id} sx={{fontSize:12}}>{c.label}</MenuItem>)}</Select></FormControl></TableCell>
          <TableCell sx={{minWidth:100}}><TextField size="small" type="number" value={row.price} onChange={e=>upd(i,'price',e.target.value)} sx={{'& .MuiInputBase-input':{fontSize:12,py:.7}}}/></TableCell>
          <TableCell sx={{minWidth:170}}><TextField size="small" value={row.driveFileId} onChange={e=>upd(i,'driveFileId',e.target.value)} placeholder="File ID..." sx={{'& .MuiInputBase-input':{fontSize:11,py:.7,fontFamily:'monospace'}}}/></TableCell>
          <TableCell><IconButton size="small" color="error" onClick={()=>setRows(rows.filter((_,j)=>j!==i))}><FA icon="trash" style={{fontSize:12}}/></IconButton></TableCell>
        </TableRow>))}</TableBody></Table></TableContainer>
      <Box sx={{px:3,py:2,borderTop:'1px solid',borderColor:'divider',bgcolor:'action.hover',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:1}}>
        <Typography variant="caption" color="text.secondary"><FA icon="circle-info" style={{marginRight:4}}/>Sản phẩm tạo ở trạng thái <b>Ẩn</b></Typography>
        <Button variant="contained" color="success" size="large" onClick={createAll} disabled={creating||busy} startIcon={creating?<CircularProgress size={15} color="inherit"/>:<FA icon="plus" style={{fontSize:14}}/>} sx={{background:GRAD.green}}>{creating?'Đang tạo...':'Tạo '+rows.length+' Sản Phẩm'}</Button>
      </Box>
    </Paper>}
    {step===3&&done.length>0&&<Paper elevation={0} sx={{p:3,borderRadius:1.5,border:'1px solid',borderColor:'divider'}}>
      <Typography variant="h6" sx={{fontWeight:800,mb:2}}><FA icon="circle-check" style={{marginRight:8,color:'#10B981'}}/>Kết Quả</Typography>
      <Stack direction="row" spacing={2} sx={{mb:2.5}}><Paper elevation={0} sx={{p:2,borderRadius:1.25,bgcolor:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',textAlign:'center',minWidth:100}}><Typography variant="h5" sx={{fontWeight:900,color:'success.main'}}>{done.filter(d=>d.ok).length}</Typography><Typography variant="caption" color="text.secondary">Thành công</Typography></Paper></Stack>
      {done.map((d,i)=><Box key={i} sx={{display:'flex',gap:1,py:.8,borderBottom:'1px dashed',borderColor:'divider',alignItems:'center'}}><FA icon={d.ok?'circle-check':'circle-xmark'} style={{color:d.ok?'#10B981':'#EF4444',fontSize:14}}/><Typography variant="body2" sx={{flex:1}}>{d.title}</Typography></Box>)}
      <Alert severity="warning" sx={{mt:2,borderRadius:1.25}} icon={<FA icon="lightbulb" style={{fontSize:16}}/>}><b>Tiếp theo:</b> Vào tab Sản Phẩm → thêm ảnh + Drive ID + giá → bật Hiển thị</Alert>
      <Button sx={{mt:2}} variant="outlined" startIcon={<FA icon="rotate-left" style={{fontSize:13}}/>} onClick={()=>{setStep(1);setFiles([]);setRows([]);setDone([]);}}>Upload tiếp</Button>
    </Paper>}
  </Box>);
}

    const r=await fetch('https://api.cloudinary.com/v1_1/vietlongbk123/image/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(d.secure_url) return d.secure_url;
    throw new Error(d.error?.message||'Upload thất bại');
  };

  // Dán ảnh vào ô Ảnh bìa
  const handleCoverPaste=async(e)=>{
    const items=e.clipboardData?.items; if(!items) return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const file=item.getAsFile(); if(!file) return;
        setCoverUploading(true);
        try{ set('cover', await uploadImage(file)); }
        catch(err){ alert('Lỗi upload ảnh bìa: '+err.message); }
        finally{ setCoverUploading(false); }
        return;
      }
    }
  };
  const handleCoverFile=async(file)=>{
    setCoverUploading(true);
    try{ set('cover', await uploadImage(file)); }
    catch(err){ alert('Lỗi upload ảnh bìa: '+err.message); }
    finally{ setCoverUploading(false); }
  };

  const save=async()=>{if(!form.title)return alert('Nhập tiêu đề');setSaving(true);
    try{const url=isEdit?`/api/articles?id=${article._id}`:'/api/articles';
      const r=await fetch(url,{method:isEdit?'PUT':'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(form)});
      if(r.ok)onSave();else{const d=await r.json();alert('Lỗi: '+(d.error||''));}}catch{alert('Lỗi kết nối');}finally{setSaving(false);}};
  return(<Dialog open fullWidth maxWidth="md" onClose={onClose} PaperProps={{sx:{borderRadius:1.5}}}>
    <DialogTitle sx={{display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:800,pb:0}}><Box sx={{display:'flex',alignItems:'center',gap:1}}><FA icon={isEdit?'pen-to-square':'plus-circle'} style={{color:'#2563EB'}}/>{isEdit?'Sửa Bài Viết':'Viết Bài Mới'}</Box><IconButton onClick={onClose} size="small"><FA icon="xmark"/></IconButton></DialogTitle>
    <DialogContent dividers><Grid container spacing={2} sx={{mt:.5}}>
      <Grid item xs={12} sm={8}><TextField fullWidth size="small" label="Tiêu đề *" value={form.title||''} onChange={e=>set('title',e.target.value)}/></Grid>
      <Grid item xs={12} sm={4}><FormControl fullWidth size="small"><InputLabel>Danh mục</InputLabel><Select value={form.category} label="Danh mục" onChange={e=>set('category',e.target.value)}>{BLOG_CATS.map(c=><MenuItem key={c.id} value={c.id}>{c.label}</MenuItem>)}</Select></FormControl></Grid>

      <Grid item xs={12}>
        <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}><FA icon="image" style={{marginRight:5}}/>Ảnh bìa — dán ảnh (Ctrl+V) hoặc nhập URL</Typography>
        <Box sx={{display:'flex',gap:1.5,alignItems:'flex-start'}}>
          {form.cover&&<Box sx={{position:'relative',width:92,height:62,flexShrink:0,borderRadius:1,overflow:'hidden',border:'1.5px solid',borderColor:'divider'}}>
            <Box component="img" src={form.cover} sx={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <IconButton size="small" onClick={()=>set('cover','')} sx={{position:'absolute',top:1,right:1,bgcolor:'rgba(239,68,68,.9)',color:'#fff',width:18,height:18,':hover':{bgcolor:'#DC2626'}}}><FA icon="xmark" style={{fontSize:9}}/></IconButton>
          </Box>}
          <TextField fullWidth size="small" value={form.cover||''} onChange={e=>set('cover',e.target.value)} onPaste={handleCoverPaste}
            placeholder="Dán ảnh (Ctrl+V) hoặc dán link https://..."
            InputProps={{endAdornment:coverUploading
              ?<InputAdornment position="end"><CircularProgress size={16}/></InputAdornment>
              :<InputAdornment position="end"><IconButton size="small" component="label"><FA icon="folder-open" style={{fontSize:13}}/>
                  <input type="file" hidden accept="image/*" onChange={e=>{const f=e.target.files[0];if(f)handleCoverFile(f);e.target.value='';}}/>
                </IconButton></InputAdornment>}}/>
        </Box>
      </Grid>

      <Grid item xs={12}><TextField fullWidth size="small" label="Tóm tắt" value={form.excerpt||''} onChange={e=>set('excerpt',e.target.value)} multiline rows={2}/></Grid>

      <Grid item xs={12}>
        <Typography variant="caption" sx={{fontWeight:700,color:'text.secondary',display:'block',mb:.7}}><FA icon="file-lines" style={{marginRight:5}}/>Nội dung bài viết</Typography>
        <RichTextEditor value={form.content} onChange={v=>set('content',v)} onUploadImage={uploadImage}
          placeholder="Viết nội dung ở đây... dùng thanh công cụ để định dạng (đậm, nghiêng, tiêu đề, danh sách...), dán ảnh (Ctrl+V) để chèn ngay tại vị trí con trỏ"/>
      </Grid>

      <Grid item xs={12}><FormControlLabel control={<Checkbox checked={!!form.isPublished} onChange={e=>set('isPublished',e.target.checked)} size="small"/>} label="Công khai"/></Grid>
    </Grid></DialogContent>
    <DialogActions sx={{p:2.5}}><Button onClick={onClose} variant="outlined" sx={{color:'text.secondary',borderColor:'divider'}}>Hủy</Button><Button onClick={save} disabled={saving} variant="contained" startIcon={saving?<CircularProgress size={15} color="inherit"/>:<FA icon="floppy-disk"/>} sx={{background:GRAD.primary}}>{saving?'Đang lưu...':'Lưu Bài'}</Button></DialogActions>
  </Dialog>);
}

// ══ ADMIN DASHBOARD ══
function AdminDashboard({token,onLogout}){
  const {mode,toggle}=useContext(ColorModeCtx);
  const [tab,setTab]=useState(0);
  const [prods,setProds]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);const [deleting,setDeleting]=useState(null);
  const [search,setSearch]=useState('');const [catF,setCatF]=useState('all');
  const [arts,setArts]=useState([]);const [artModal,setArtModal]=useState(null);
  const [reqs,setReqs]=useState([]);const [reqDetail,setReqDetail]=useState(null);
  const isMobile=useMediaQuery(t=>t.breakpoints.down('md'));
  const load=async(silent=false)=>{if(!silent)setLoading(true);try{const r=await fetch('/api/products?admin=1',{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();if(Array.isArray(d))setProds(d);}catch{}finally{if(!silent)setLoading(false);}};
  const loadArts=async()=>{try{const r=await fetch('/api/articles?admin=1',{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();if(Array.isArray(d))setArts(d);}catch{}};
  const loadReqs=async()=>{try{const r=await fetch('/api/custom-requests?admin=1',{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();if(Array.isArray(d))setReqs(d);}catch{}};
  useEffect(()=>{load();loadArts();loadReqs();const iv=setInterval(()=>{load(true);loadReqs();},30000);return()=>clearInterval(iv);},[]);
  const del=async(id,title)=>{if(!confirm(`Xóa "${title}"?`))return;setDeleting(id);try{const r=await fetch(`/api/products?id=${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});if(r.ok)load();}finally{setDeleting(null);}};
  const delArt=async(id,title)=>{if(!confirm(`Xóa bài "${title}"?`))return;try{const r=await fetch(`/api/articles?id=${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});if(r.ok)loadArts();}catch{}};
  const updateReqStatus=async(id,status)=>{try{await fetch(`/api/custom-requests?id=${id}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({status})});loadReqs();}catch{}};
  const delReq=async(id)=>{if(!confirm('Xóa yêu cầu này?'))return;try{await fetch(`/api/custom-requests?id=${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});loadReqs();}catch{}};
  const filtered=prods.filter(p=>{const mc=catF==='all'||p.category===catF;const mq=!search||p.title?.toLowerCase().includes(search.toLowerCase())||p.code?.toLowerCase().includes(search.toLowerCase());return mc&&mq;});
  const totalDl=prods.reduce((s,p)=>s+(p.downloadCount||0),0);
  const paidProds=prods.filter(p=>!p.isFree&&p.price>0);
  const totalRev=paidProds.reduce((s,p)=>s+(p.downloadCount||0)*p.price,0);
  const topProds=[...prods].sort((a,b)=>(b.downloadCount||0)-(a.downloadCount||0));
  const newReqs=reqs.filter(r=>r.status==='new').length;
  const STATS=[['box-open',prods.length,'Tổng bản vẽ','#2563EB'],['download',totalDl.toLocaleString('vi-VN'),'Tổng lượt tải','#10B981'],['sack-dollar',vnd(totalRev),'Doanh thu ước tính','#F59E0B'],['pen-ruler',newReqs,'Yêu cầu vẽ mới','#EC4899']];
  return(<Box sx={{minHeight:'100vh',bgcolor:'background.default'}}>
    <AppBar position="sticky" elevation={0} sx={{background:GRAD.hero,borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <Toolbar sx={{gap:1}}>
        <Box sx={{display:'flex',alignItems:'center',gap:1.5,flex:1}}><Box sx={{width:32,height:32,borderRadius:.75,background:GRAD.primary,display:'flex',alignItems:'center',justifyContent:'center'}}><FA icon="compass-drafting" style={{color:'#fff',fontSize:15}}/></Box><Typography sx={{fontWeight:900,color:'#fff',fontSize:15}}>MuaBanVe<span style={{color:'#60A5FA'}}>2D</span><Box component="span" sx={{color:'rgba(255,255,255,.4)',fontSize:11,fontWeight:400,ml:1}}>Admin</Box></Typography></Box>
        <IconButton onClick={toggle} sx={{color:'rgba(255,255,255,.8)'}}><FA icon={mode==='dark'?'sun':'moon'} style={{fontSize:16}}/></IconButton>
        <Button href="/" target="_blank" size="small" startIcon={<FA icon="arrow-up-right-from-square" style={{fontSize:11}}/>} sx={{color:'rgba(255,255,255,.5)',display:{xs:'none',sm:'flex'}}}>Website</Button>
        <Button onClick={onLogout} variant="contained" color="error" size="small" startIcon={<FA icon="right-from-bracket" style={{fontSize:11}}/>}>{isMobile?'':'Đăng xuất'}</Button>
      </Toolbar>
    </AppBar>
    <Container maxWidth="xl" sx={{py:3}}>
      <Grid container spacing={2} sx={{mb:3}}>{STATS.map(([ic,n,l,c])=>(<Grid item xs={6} md={3} key={l}><Paper elevation={0} sx={{p:2.5,borderRadius:1.5,border:'1px solid',borderColor:'divider',borderLeft:`4px solid ${c}`}}><Box sx={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><Box><Typography variant="caption" color="text.secondary" sx={{fontWeight:600,display:'block',mb:.5}}>{l}</Typography><Typography variant="h5" sx={{fontWeight:900}}>{n}</Typography></Box><Box sx={{width:40,height:40,borderRadius:.75,bgcolor:alpha(c,.12),display:'flex',alignItems:'center',justifyContent:'center'}}><FA icon={ic} style={{fontSize:18,color:c}}/></Box></Box></Paper></Grid>))}</Grid>
      <Paper elevation={0} sx={{borderRadius:1.5,border:'1px solid',borderColor:'divider',overflow:'hidden'}}>
        <Tabs value={tab} onChange={(_,v)=>setTab(v)} variant="scrollable" scrollButtons="auto" sx={{borderBottom:'1px solid',borderColor:'divider'}}>
          <Tab icon={<FA icon="box-open" style={{fontSize:14}}/>} iconPosition="start" label="Sản Phẩm"/>
          <Tab icon={<FA icon="chart-bar" style={{fontSize:14}}/>} iconPosition="start" label="Doanh Thu"/>
          <Tab icon={<FA icon="cloud-arrow-up" style={{fontSize:14}}/>} iconPosition="start" label="Upload Hàng Loạt"/>
          <Tab icon={<FA icon="newspaper" style={{fontSize:14}}/>} iconPosition="start" label="Bài Viết"/>
          <Tab icon={<Badge badgeContent={newReqs} color="error" sx={{'& .MuiBadge-badge':{fontSize:9,height:16,minWidth:16}}}><FA icon="pen-ruler" style={{fontSize:14}}/></Badge>} iconPosition="start" label="Yêu Cầu Vẽ"/>
        </Tabs>
        <Box sx={{p:{xs:2,md:3}}}>
          {tab===0&&<>
            <Box sx={{display:'flex',gap:1.5,mb:2,flexWrap:'wrap'}}>
              <TextField size="small" placeholder="Tìm tên, mã..." value={search} onChange={e=>setSearch(e.target.value)} sx={{flex:1,minWidth:180}} InputProps={{startAdornment:<InputAdornment position="start"><FA icon="magnifying-glass" style={{fontSize:13,color:'#94A3B8'}}/></InputAdornment>}}/>
              <FormControl size="small" sx={{minWidth:150}}><Select value={catF} onChange={e=>setCatF(e.target.value)}><MenuItem value="all">Tất cả danh mục</MenuItem>{CATS.map(c=><MenuItem key={c.id} value={c.id}>{c.label}</MenuItem>)}</Select></FormControl>
              <Button variant="outlined" onClick={()=>load()} startIcon={<FA icon="rotate" style={{fontSize:13}}/>}>Làm mới</Button>
              <Button variant="contained" onClick={()=>setModal('add')} startIcon={<FA icon="plus" style={{fontSize:13}}/>} sx={{background:GRAD.primary}}>Thêm</Button>
            </Box>
            {loading?<Box sx={{textAlign:'center',py:6}}><CircularProgress/></Box>:filtered.length===0?<Box sx={{textAlign:'center',py:8}}><I8 name="box"/><Typography color="text.disabled" sx={{mt:1}}>Chưa có bản vẽ nào</Typography></Box>:
            <TableContainer><Table><TableHead><TableRow sx={{bgcolor:'action.hover'}}>{['#','Mã','Tên Bản Vẽ','Danh Mục','Giá','📥','Files','Trạng thái',''].map(h=><TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</TableCell>)}</TableRow></TableHead>
              <TableBody>{filtered.map((p,i)=>{const cat=catOf(p.category);return(<TableRow key={p._id} hover>
                <TableCell sx={{color:'text.disabled',fontWeight:700,fontSize:12,width:32}}>{i+1}</TableCell>
                <TableCell sx={{fontFamily:'monospace',fontSize:11,color:'text.secondary'}}>{p.code||'—'}</TableCell>
                <TableCell sx={{maxWidth:240}}><Box sx={{display:'flex',alignItems:'center',gap:1}}>{p.images?.[0]&&<Box component="img" src={p.images[0]} sx={{width:38,height:28,borderRadius:1,objectFit:'cover',flexShrink:0}}/>}<Box><Typography variant="body2" sx={{fontWeight:600,lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{p.title}</Typography>{p.subcategory&&<Typography variant="caption" color="text.disabled">{p.subcategory}</Typography>}</Box></Box></TableCell>
                <TableCell><Chip label={<><I8 name={cat.i8} size={12} style={{verticalAlign:'-2px',marginRight:4}}/>{cat.label}</>} size="small" sx={{bgcolor:alpha(cat.color,.12),color:cat.color,fontWeight:700}}/></TableCell>
                <TableCell sx={{whiteSpace:'nowrap'}}>{p.isFree?<Typography variant="body2" color="success.main" sx={{fontWeight:700}}>Miễn phí</Typography>:<Typography variant="body2" color="primary.main" sx={{fontWeight:700}}>{vnd(p.price||0)}</Typography>}</TableCell>
                <TableCell><Chip label={<><FA icon="download" style={{fontSize:9,marginRight:3}}/>{(p.downloadCount||0).toLocaleString()}</>} size="small" sx={{bgcolor:'rgba(2,132,199,.08)',color:'#0284C7',fontWeight:700}}/></TableCell>
                <TableCell sx={{fontSize:12,color:'text.secondary'}}>{p.fileCount||0}</TableCell>
                <TableCell><Chip label={p.isActive?'Hiển thị':'Ẩn'} size="small" color={p.isActive?'success':'error'} variant="outlined" sx={{fontWeight:600}}/></TableCell>
                <TableCell><Stack direction="row" spacing={.5}><IconButton size="small" onClick={()=>setModal(p)} sx={{color:'primary.main',bgcolor:'action.hover'}}><FA icon="pen-to-square" style={{fontSize:13}}/></IconButton><IconButton size="small" onClick={()=>del(p._id,p.title)} disabled={deleting===p._id} sx={{color:'error.main',bgcolor:'action.hover'}}>{deleting===p._id?<CircularProgress size={12}/>:<FA icon="trash" style={{fontSize:13}}/>}</IconButton></Stack></TableCell>
              </TableRow>);})}</TableBody></Table></TableContainer>}
            <Typography variant="caption" color="text.disabled" sx={{display:'block',textAlign:'center',mt:1.5}}>{filtered.length} bản vẽ • tổng {prods.length}</Typography>
          </>}
          {tab===1&&<>
            <Grid container spacing={2} sx={{mb:3}}>{[['sack-dollar','Doanh thu ước tính',vnd(totalRev),'#EA580C'],['download','Tổng lượt tải',totalDl.toLocaleString('vi-VN'),'#0284C7'],['trophy',`Top: ${topProds[0]?.title?.slice(0,18)||'—'}`,`${topProds[0]?.downloadCount||0} lượt`,'#10B981'],['boxes-stacked',`${paidProds.length} sp có phí`,'Có giá bán','#2563EB']].map(([ic,l,v,c])=>(<Grid item xs={6} md={3} key={l}><Paper elevation={0} sx={{p:2,borderRadius:1.25,border:'1px solid',borderColor:'divider',borderTop:`3px solid ${c}`}}><Box sx={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><Box><Typography variant="caption" color="text.secondary" sx={{fontWeight:600,display:'block',mb:.3}}>{l}</Typography><Typography variant="h6" sx={{fontWeight:800}}>{v}</Typography></Box><FA icon={ic} style={{fontSize:22,color:c}}/></Box></Paper></Grid>))}</Grid>
            <Box sx={{display:'flex',justifyContent:'space-between',mb:1.5}}><Typography variant="subtitle1" sx={{fontWeight:800}}><FA icon="chart-bar" style={{marginRight:8,color:'#2563EB'}}/>Chi Tiết Lượt Tải</Typography><Button size="small" startIcon={<FA icon="rotate" style={{fontSize:12}}/>} onClick={()=>load()}>Làm mới</Button></Box>
            <TableContainer><Table><TableHead><TableRow sx={{bgcolor:'action.hover'}}>{['#','Tên Bản Vẽ','Danh Mục','Giá','Lượt Tải','Doanh Thu'].map(h=><TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase'}}>{h}</TableCell>)}</TableRow></TableHead>
              <TableBody>{topProds.map((p,i)=>{const cat=catOf(p.category);const dl=p.downloadCount||0;const rev=p.isFree?0:dl*(p.price||0);const pct=totalDl>0?Math.round(dl/totalDl*100):0;return(<TableRow key={p._id} hover>
                <TableCell sx={{fontWeight:700,color:'text.disabled',width:36}}>{i+1}</TableCell>
                <TableCell sx={{maxWidth:260}}><Typography variant="body2" sx={{fontWeight:600,lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{p.title}</Typography><Box sx={{mt:.5,display:'flex',alignItems:'center',gap:.5}}><LinearProgress variant="determinate" value={pct} sx={{flex:1,height:3,borderRadius:.75}}/><Typography variant="caption" color="text.disabled" sx={{fontSize:10}}>{pct}%</Typography></Box></TableCell>
                <TableCell><Chip label={cat.label} size="small" sx={{bgcolor:alpha(cat.color,.12),color:cat.color,fontWeight:700}}/></TableCell>
                <TableCell sx={{whiteSpace:'nowrap'}}>{p.isFree?<Typography variant="body2" color="success.main" sx={{fontWeight:700}}>Miễn phí</Typography>:<Typography variant="body2" color="primary.main" sx={{fontWeight:700}}>{vnd(p.price||0)}</Typography>}</TableCell>
                <TableCell><Chip label={dl.toLocaleString()} size="small" sx={{bgcolor:'rgba(2,132,199,.08)',color:'#0284C7',fontWeight:800}}/></TableCell>
                <TableCell sx={{fontWeight:700,color:rev>0?'success.main':'text.disabled'}}>{rev>0?vnd(rev):'—'}</TableCell>
              </TableRow>);})}</TableBody></Table></TableContainer>
          </>}
          {tab===2&&<BatchUploadTab token={token}/>}
          {tab===3&&<>
            <Box sx={{display:'flex',justifyContent:'space-between',mb:2}}><Typography variant="subtitle1" sx={{fontWeight:800}}><FA icon="newspaper" style={{marginRight:8,color:'#0EA5E9'}}/>Quản Lý Bài Viết</Typography><Button variant="contained" onClick={()=>setArtModal('add')} startIcon={<FA icon="plus" style={{fontSize:13}}/>} sx={{background:GRAD.pink}}>Viết Bài</Button></Box>
            {arts.length===0?<Box sx={{textAlign:'center',py:8}}><I8 name="document"/><Typography color="text.disabled" sx={{mt:1}}>Chưa có bài viết. Bấm "Viết Bài" để tạo bài chia sẻ đầu tiên.</Typography></Box>:
            <Grid container spacing={2}>{arts.map(a=>(<Grid item xs={12} sm={6} md={4} key={a._id}><Paper elevation={0} sx={{borderRadius:1.25,border:'1px solid',borderColor:'divider',overflow:'hidden'}}>
              {a.cover&&<Box component="img" src={a.cover} sx={{width:'100%',height:120,objectFit:'cover'}}/>}
              <Box sx={{p:2}}><Chip size="small" label={blogCatOf(a.category).label} sx={{mb:1,bgcolor:alpha(blogCatOf(a.category).color,.12),color:blogCatOf(a.category).color,fontWeight:700}}/>
                <Typography variant="body2" sx={{fontWeight:700,mb:1,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{a.title}</Typography>
                <Box sx={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><Chip size="small" label={a.isPublished?'Công khai':'Nháp'} color={a.isPublished?'success':'default'} variant="outlined"/><Stack direction="row" spacing={.5}><IconButton size="small" onClick={()=>setArtModal(a)} sx={{color:'primary.main'}}><FA icon="pen-to-square" style={{fontSize:12}}/></IconButton><IconButton size="small" onClick={()=>delArt(a._id,a.title)} sx={{color:'error.main'}}><FA icon="trash" style={{fontSize:12}}/></IconButton></Stack></Box>
              </Box>
            </Paper></Grid>))}</Grid>}
          </>}
          {tab===4&&<>
            <Typography variant="subtitle1" sx={{fontWeight:800,mb:2}}><FA icon="pen-ruler" style={{marginRight:8,color:'#EC4899'}}/>Yêu Cầu Vẽ Theo Thiết Kế ({reqs.length})</Typography>
            {reqs.length===0?<Box sx={{textAlign:'center',py:8}}><I8 name="inbox"/><Typography color="text.disabled" sx={{mt:1}}>Chưa có yêu cầu nào từ khách hàng.</Typography></Box>:
            <TableContainer><Table size="small"><TableHead><TableRow sx={{bgcolor:'action.hover'}}>{['','Khách Hàng','Loại','Mô Tả','Ngày Gửi','Trạng Thái',''].map(h=><TableCell key={h} sx={{fontWeight:700,fontSize:11,color:'text.secondary',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</TableCell>)}</TableRow></TableHead>
              <TableBody>{reqs.map(r=>{
                const STATUS_MAP={new:['Mới','error'],contacted:['Đã liên hệ','warning'],quoted:['Đã báo giá','info'],done:['Hoàn thành','success'],cancelled:['Đã hủy','default']};
                const [stLabel,stColor]=STATUS_MAP[r.status]||STATUS_MAP.new;
                return(<TableRow key={r._id} hover sx={{cursor:'pointer'}} onClick={()=>setReqDetail(r)}>
                  <TableCell>{r.referenceImages?.[0]&&<Box component="img" src={r.referenceImages[0]} sx={{width:36,height:28,borderRadius:.5,objectFit:'cover'}}/>}</TableCell>
                  <TableCell><Typography variant="body2" sx={{fontWeight:700}}>{r.name}</Typography><Typography variant="caption" color="text.disabled">{r.phone}</Typography></TableCell>
                  <TableCell><Chip size="small" label={catOf(r.category).label||'Khác'} sx={{bgcolor:alpha(catOf(r.category).color,.12),color:catOf(r.category).color,fontWeight:700}}/></TableCell>
                  <TableCell sx={{maxWidth:240}}><Typography variant="body2" sx={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{r.description}</Typography></TableCell>
                  <TableCell sx={{fontSize:12,color:'text.secondary',whiteSpace:'nowrap'}}>{timeAgo(r.createdAt)}</TableCell>
                  <TableCell><Chip size="small" label={stLabel} color={stColor} variant="outlined" sx={{fontWeight:700}}/></TableCell>
                  <TableCell onClick={e=>e.stopPropagation()}><IconButton size="small" color="error" onClick={()=>delReq(r._id)}><FA icon="trash" style={{fontSize:12}}/></IconButton></TableCell>
                </TableRow>);
              })}</TableBody></Table></TableContainer>}
          </>}
        </Box>
      </Paper>
    </Container>
    {modal&&<ProductModal prod={modal==='add'?null:modal} token={token} onClose={()=>setModal(null)} onSave={()=>{setModal(null);load();}}/>}
    {artModal&&<ArticleModal article={artModal==='add'?null:artModal} token={token} onClose={()=>setArtModal(null)} onSave={()=>{setArtModal(null);loadArts();}}/>}
    {reqDetail&&<Dialog open fullWidth maxWidth="sm" onClose={()=>setReqDetail(null)} PaperProps={{sx:{borderRadius:1.5}}}>
      <DialogTitle sx={{display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:800}}>
        Chi Tiết Yêu Cầu<IconButton onClick={()=>setReqDetail(null)} size="small"><FA icon="xmark"/></IconButton>
      </DialogTitle>
      <DialogContent dividers>
        <Stack spacing={1.5}>
          <Box><Typography variant="caption" color="text.disabled">Khách hàng</Typography><Typography variant="body1" sx={{fontWeight:700}}>{reqDetail.name}</Typography></Box>
          <Box><Typography variant="caption" color="text.disabled">Liên hệ</Typography><Typography variant="body2">{reqDetail.phone}{reqDetail.email&&<> · {reqDetail.email}</>}</Typography></Box>
          <Box><Typography variant="caption" color="text.disabled">Loại bản vẽ</Typography><Typography variant="body2">{catOf(reqDetail.category).label||'Khác'}</Typography></Box>
          {reqDetail.budget&&<Box><Typography variant="caption" color="text.disabled">Ngân sách</Typography><Typography variant="body2">{reqDetail.budget}</Typography></Box>}
          {reqDetail.deadline&&<Box><Typography variant="caption" color="text.disabled">Thời hạn</Typography><Typography variant="body2">{reqDetail.deadline}</Typography></Box>}
          <Box><Typography variant="caption" color="text.disabled">Mô tả yêu cầu</Typography><Typography variant="body2" sx={{whiteSpace:'pre-wrap'}}>{reqDetail.description}</Typography></Box>
          {reqDetail.referenceImages?.length>0&&<Box><Typography variant="caption" color="text.disabled" sx={{display:'block',mb:.5}}>Ảnh tham khảo</Typography>
            <Stack direction="row" spacing={1} flexWrap="wrap" sx={{gap:1}}>{reqDetail.referenceImages.map((u,i)=><Box key={i} component="img" src={u} sx={{width:80,height:60,borderRadius:.5,objectFit:'cover'}}/>)}</Stack></Box>}
          <Box><Typography variant="caption" color="text.disabled" sx={{display:'block',mb:.5}}>Cập nhật trạng thái</Typography>
            <Stack direction="row" spacing={1} flexWrap="wrap" sx={{gap:1}}>
              {[['contacted','Đã liên hệ','warning'],['quoted','Đã báo giá','info'],['done','Hoàn thành','success'],['cancelled','Hủy','default']].map(([st,l,c])=>(
                <Button key={st} size="small" variant={reqDetail.status===st?'contained':'outlined'} color={c} onClick={()=>{updateReqStatus(reqDetail._id,st);setReqDetail({...reqDetail,status:st});}}>{l}</Button>
              ))}
            </Stack>
          </Box>
        </Stack>
      </DialogContent>
      <DialogActions sx={{p:2}}>
        <Button href={`https://zalo.me/${reqDetail.phone?.replace(/\D/g,'')}`} target="_blank" variant="contained" startIcon={<ZaloIcon size={18}/>} sx={{background:'#0068FF'}}>Chat Zalo Khách</Button>
      </DialogActions>
    </Dialog>}
  </Box>);
}

function AdminPage(){
  const [token,setToken]=useState(()=>sessionStorage.getItem('adminToken')||'');
  const logout=()=>{sessionStorage.removeItem('adminToken');setToken('');};
  if(!token)return <AdminLoginPage onLogin={setToken}/>;
  return <AdminDashboard token={token} onLogout={logout}/>;
}
// ══ APP ROOT ══
function AppContent(){
  if(window.location.pathname.toLowerCase().startsWith('/admin')) return <AdminPage/>;
  const [page,setPage]=useState('home');
  const [catFilter,setCatFilter]=useState('all');
  const [query,setQuery]=useState('');
  const [prod,setProd]=useState(null);
  const [article,setArticle]=useState(null);
  const [order,setOrder]=useState(null);
  const [payState,setPayState]=useState('waiting');
  const {prods}=useProducts();
  const {arts}=useArticles();
  const isMobile=useMediaQuery(t=>t.breakpoints.down('sm'));
  const [botNav,setBotNav]=useState(0);
  const go=useCallback((p,data=null)=>{
    if(data)setProd(data);
    setPage(p);window.scrollTo(0,0);
    if(p==='home')setBotNav(0);if(p==='shop')setBotNav(1);if(p==='content')setBotNav(2);
  },[]);
  const goArticle=useCallback(a=>{setArticle(a);setPage('article');window.scrollTo(0,0);},[]);
  const buy=useCallback(p=>{const oid=genOid();setOrder({id:oid,prod:p});setPayState('waiting');setPage('pay');window.scrollTo(0,0);},[]);
  return(<>
    <NavBar page={page} go={go} query={query} setQuery={setQuery}/>
    <Box component="main" sx={{pb:{xs:7,sm:0},minHeight:'60vh'}}>
      {page==='home'&&<HomePage go={go} prods={prods}/>}
      {page==='shop'&&<ShopPage go={go} prods={prods} catFilter={catFilter} setCatFilter={setCatFilter} query={query} setQuery={setQuery} buy={buy}/>}
      {page==='content'&&<ContentPage go={go} arts={arts} goArticle={goArticle}/>}
      {page==='article'&&<ArticlePage article={article} go={go}/>}
      {page==='custom'&&<CustomOrderPage go={go}/>}
      {page==='detail'&&<DetailPage prod={prod} go={go} buy={buy} prods={prods}/>}
      {page==='pay'&&<PayPage order={order} payState={payState} setPayState={setPayState} go={go}/>}
      {page==='success'&&<SuccessPage order={order} go={go}/>}
    </Box>
    {isMobile&&page!=='pay'&&page!=='success'&&<Paper elevation={4} sx={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,borderTop:'1px solid',borderColor:'divider'}}>
      <BottomNavigation value={botNav} onChange={(_,v)=>{setBotNav(v);go(v===0?'home':v===1?'shop':'content');}} showLabels>
        <BottomNavigationAction label="Trang Chủ" icon={<FA icon="house" style={{fontSize:18}}/>}/>
        <BottomNavigationAction label="Kho Bản Vẽ" icon={<FA icon="store" style={{fontSize:18}}/>}/>
        <BottomNavigationAction label="Chia Sẻ" icon={<FA icon="newspaper" style={{fontSize:18}}/>}/>
      </BottomNavigation>
    </Paper>}
  </>);
}

function App(){
  const [mode,setMode]=useState(()=>{
    try{return localStorage.getItem('kbv-theme')||'dark';}catch{return 'dark';}
  });
  const toggle=useCallback(()=>{
    setMode(m=>{const next=m==='light'?'dark':'light';try{localStorage.setItem('kbv-theme',next);}catch{}return next;});
  },[]);
  const themeObj=useMemo(()=>makeTheme(mode),[mode]);
  useEffect(()=>{document.body.dataset.mode=mode;},[mode]);
  return(
    <ColorModeCtx.Provider value={{mode,toggle}}>
      <ThemeProvider theme={themeObj}>
        <CssBaseline/>
        <AppContent/>
      </ThemeProvider>
    </ColorModeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
