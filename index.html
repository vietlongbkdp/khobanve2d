function Stars({r}){return(<span style={{fontSize:12}}>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(r)?"#F59E0B":"#D1D5DB"}}>★</span>)}<span style={{color:"#6B7280",marginLeft:4,fontWeight:600}}>{r}</span></span>);}

function ProductCard({p,onOpen}){
  const cat=catOf(p.cat||p.category);
  const isFree=p.free||p.isFree;
  const isNew=p.isNew;
  const isHot=p.hot||p.isHot;
  const price=p.price||0;
  const oldPrice=p.oldPrice||p.originalPrice||null;
  const disc=oldPrice&&price?Math.round((1-price/oldPrice)*100):0;
  const dl=p.dl||p.downloadCount||0;
  const rate=p.rate||p.rating||5;
  return(<div className="kbv-card" onClick={()=>onOpen(p)} style={{
    background:"#fff",borderRadius:16,overflow:"hidden",
    boxShadow:"0 1px 3px rgba(15,23,42,.07),0 8px 20px rgba(15,23,42,.06)",
    cursor:"pointer",position:"relative",border:"1px solid #F1F5F9"}}>
    <div style={{position:"relative",overflow:"hidden",height:190}}>
      <img src={(p.images&&p.images[0])||getBP(p.cat||p.category)} alt={p.title}

        <span style={{background:"rgba(15,23,42,.65)",backdropFilter:"blur(4px)",color:cat?.color||"#60A5FA",padding:"3px 9px",borderRadius:8,fontSize:10.5,fontWeight:700,letterSpacing:.3}}>

        </span>
        <span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>📥 {dl.toLocaleString()}</span>
      </div>
    </div>
    <div style={{padding:"14px 16px 16px"}}>
      <div style={{fontSize:13.5,fontWeight:700,color:"#0F172A",lineHeight:1.45,marginBottom:10,

      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

            :<><span style={{fontSize:16,fontWeight:800,color:"#1D4ED8"}}>{vnd(price)}</span>
              {oldPrice&&<span style={{fontSize:11.5,color:"#94A3B8",textDecoration:"line-through",marginLeft:6}}>{vnd(oldPrice)}</span>}</>

  </div>);
}

/* ── Lightbox với zoom ── */
function Lightbox({imgs, startIdx, onClose}){
  const [idx,setIdx]     = useState(startIdx||0);
  const [zoom,setZoom]   = useState(1);
  const [pos,setPos]     = useState({x:0,y:0});
  const [dragging,setDragging] = useState(false);
  const [dragStart,setDragStart] = useState({x:0,y:0});
  const imgRef = useRef(null);

  // Reset zoom khi đổi ảnh
  useEffect(()=>{ setZoom(1); setPos({x:0,y:0}); },[idx]);

  // Keyboard
  useEffect(()=>{
    const h=e=>{
      if(e.key==="Escape"){ if(zoom>1){setZoom(1);setPos({x:0,y:0});}else onClose(); }
      if(e.key==="ArrowRight"&&zoom===1) setIdx(i=>Math.min(i+1,imgs.length-1));
      if(e.key==="ArrowLeft"&&zoom===1)  setIdx(i=>Math.max(i-1,0));
      if(e.key==="+"||e.key==="=") setZoom(z=>Math.min(z+0.5,5));
      if(e.key==="-")               setZoom(z=>Math.max(z-0.5,1));
      if(e.key==="0")               { setZoom(1); setPos({x:0,y:0}); }
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[zoom,imgs.length]);

  // Wheel zoom
  const onWheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.3 : 0.3;
    setZoom(z=>Math.max(1,Math.min(5,z+delta)));
    if(zoom+delta<=1) setPos({x:0,y:0});
  };

  // Drag to pan khi zoom > 1
  const onMouseDown = e => {
    if(zoom<=1) return;
    e.preventDefault();
    setDragging(true);
    setDragStart({x:e.clientX-pos.x, y:e.clientY-pos.y});
  };
  const onMouseMove = e => {
    if(!dragging) return;
    setPos({x:e.clientX-dragStart.x, y:e.clientY-dragStart.y});
  };
  const onMouseUp = ()=>setDragging(false);

  // Touch zoom (pinch)
  const lastDist = useRef(null);
  const onTouchMove = e => {
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(lastDist.current){
        const delta=(dist-lastDist.current)*0.01;
        setZoom(z=>Math.max(1,Math.min(5,z+delta)));
      }
      lastDist.current=dist;
    }
  };
  const onTouchEnd=()=>{ lastDist.current=null; };

  const canPrev = idx>0 && zoom===1;
  const canNext = idx<imgs.length-1 && zoom===1;

  return(
    <div
      style={{position:"fixed",inset:0,background:"#000",zIndex:1000,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        cursor:zoom>1?(dragging?"grabbing":"grab"):"default",userSelect:"none"}}
      onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
      onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
    >
      {/* Toolbar */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:52,
        background:"linear-gradient(to bottom,rgba(0,0,0,.7),transparent)",
        display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",zIndex:10}}>
        {/* Zoom controls */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>{setZoom(z=>Math.max(1,z-0.5));if(zoom-0.5<=1)setPos({x:0,y:0});}}
            style={{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",width:34,height:34,
              borderRadius:8,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
          <span style={{color:"#fff",fontSize:13,fontWeight:600,minWidth:44,textAlign:"center"}}>
            {Math.round(zoom*100)}%</span>
          <button onClick={()=>setZoom(z=>Math.min(5,z+0.5))}
            style={{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",width:34,height:34,
              borderRadius:8,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          {zoom>1&&<button onClick={()=>{setZoom(1);setPos({x:0,y:0});}}
            style={{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",padding:"0 12px",height:34,
              borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>Reset</button>}
        </div>
        {/* Counter */}
        {imgs.length>1&&<span style={{color:"rgba(255,255,255,.7)",fontSize:13,fontWeight:600}}>
          {idx+1} / {imgs.length}
        </span>}
        {/* Close */}
        <button onClick={onClose}
          style={{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",
            width:34,height:34,borderRadius:8,fontSize:18,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>

      {/* Ảnh chính */}
      <div style={{flex:1,width:"100%",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}
        onWheel={onWheel}>
        <img
          ref={imgRef}
          src={imgs[idx]} alt=""
          onMouseDown={onMouseDown}
          onDoubleClick={()=>{
            if(zoom===1) setZoom(2.5);
            else { setZoom(1); setPos({x:0,y:0}); }
          }}
          style={{
            maxWidth:"100vw", maxHeight:"calc(100vh - 52px - 80px)",
            objectFit:"contain", display:"block",
            transform:`scale(${zoom}) translate(${pos.x/zoom}px,${pos.y/zoom}px)`,
            transformOrigin:"center",
            transition:dragging?"none":"transform .15s ease",
            cursor:zoom>1?(dragging?"grabbing":"grab"):"zoom-in",
            userSelect:"none", WebkitUserDrag:"none",
          }}
          draggable={false}
        />
      </div>

      {/* Prev / Next */}
      {canPrev&&<button
        onClick={()=>setIdx(i=>i-1)}
        style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
          background:"rgba(255,255,255,.12)",border:"none",color:"#fff",
          width:48,height:48,borderRadius:"50%",fontSize:24,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s",zIndex:10}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.25)"}
        onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.12)"}>‹</button>}
      {canNext&&<button
        onClick={()=>setIdx(i=>i+1)}
        style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
          background:"rgba(255,255,255,.12)",border:"none",color:"#fff",
          width:48,height:48,borderRadius:"50%",fontSize:24,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s",zIndex:10}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.25)"}
        onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.12)"}>›</button>}

      {/* Hướng dẫn */}
      <div style={{position:"absolute",bottom:imgs.length>1?90:16,left:"50%",transform:"translateX(-50%)",
        background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.5)",
        padding:"4px 14px",borderRadius:20,fontSize:11,whiteSpace:"nowrap",pointerEvents:"none"}}>
        🖱️ Cuộn/Pinch để zoom · Double-click phóng to · Kéo để di chuyển
      </div>

      {/* Thumbnails */}
      {imgs.length>1&&<div
        style={{position:"absolute",bottom:0,left:0,right:0,height:80,
          background:"linear-gradient(to top,rgba(0,0,0,.8),transparent)",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"0 16px",overflow:"auto"}}>
        {imgs.map((img,i)=>(
          <img key={i} src={img} alt="" onClick={()=>setIdx(i)}
            style={{height:52,width:70,objectFit:"cover",borderRadius:6,cursor:"pointer",flexShrink:0,
              border:i===idx?"2.5px solid #fff":"2px solid rgba(255,255,255,.2)",
              opacity:i===idx?1:.55,transition:"all .2s"}}/>
        ))}
      </div>}
    </div>
  );
}

            {related.map(rp=><ProductCard key={rp.id||rp._id} p={rp} onOpen={xp=>go("detail",xp)}/>)}
          </div>
        </div>
      )}
    </div>
  );
}


function PayPage({order,payState,setPayState,go}){
  const [elapsed,setElapsed]=useState(0);
  const [pollSt,setPollSt]=useState("polling");
  const timerRef=useRef(null);const pollRef=useRef(null);

  useEffect(()=>{
    timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    return()=>clearInterval(timerRef.current);
  },[]);

  // ── AUTO POLLING /api/check-payment ──
  useEffect(()=>{
    if(!order||payState!=="waiting")return;
    const poll=async()=>{
      try{
        const res=await fetch(`/api/check-payment?orderId=${order.id}&amount=${order.prod.price}`);
        const data=await res.json();
        if(data.paid){
          setPayState("success");clearInterval(timerRef.current);clearInterval(pollRef.current);
          setTimeout(()=>go("success"),1400);
        }else if(data.demo){
          // Demo mode — SePay chưa cấu hình, hiện nút thủ công
          setPollSt("demo");clearInterval(pollRef.current);
        }else{setPollSt("polling");}
      }catch(e){setPollSt("error");}
    };
    poll();pollRef.current=setInterval(poll,4000);
    return()=>clearInterval(pollRef.current);
  },[order,payState]);

  const simulatePay=()=>{
    setPollSt("checking");
    setTimeout(()=>{setPayState("success");clearInterval(timerRef.current);setTimeout(()=>go("success"),1400);},1600);
  };

  if(!order)return null;const{prod,id}=order;
  const mins=String(Math.floor(elapsed/60)).padStart(2,"0");const secs=String(elapsed%60).padStart(2,"0");
  return(<div style={{maxWidth:540,margin:"40px auto",padding:"0 20px"}}>
    <div className="kbv-fadeup" style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 8px 40px rgba(15,23,42,.14)"}}>
      <div style={{background:"linear-gradient(135deg,#0F172A,#1E3A8A)",padding:"22px 28px",color:"#fff"}}>
        <div style={{fontSize:12,color:"#93C5FD",fontWeight:600,marginBottom:4}}>THANH TOÁN ĐƠN HÀNG</div>
        <div style={{fontFamily:"'Be Vietnam Pro',sans-serif",fontSize:16,fontWeight:800,lineHeight:1.4}}>{prod.title}</div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
          <span style={{fontSize:12,color:"#94A3B8"}}>Mã đơn: <b style={{color:"#60A5FA"}}>{id}</b></span>
          <span style={{fontSize:14,color:"#94A3B8"}}>⏱ <b style={{color:"#FCD34D"}}>{mins}:{secs}</b></span>
        </div>
      </div>
      <div style={{padding:"28px 28px 0",textAlign:"center"}}>
        {payState==="success"?(
          <div className="kbv-fadeup" style={{padding:"30px 0"}}>
            <div style={{fontSize:60,marginBottom:10}}>✅</div>
            <div style={{fontFamily:"'Be Vietnam Pro',sans-serif",fontSize:20,fontWeight:800,color:"#059669"}}>Thanh toán thành công!</div>
            <div style={{fontSize:13,color:"#64748B",marginTop:6}}>Đang chuyển đến trang tải xuống…</div>
          </div>
        ):(
          <>
            <div style={{fontSize:13,color:"#64748B",marginBottom:14}}>Quét mã QR bên dưới để thanh toán</div>
            <div style={{display:"inline-block",border:"4px solid #E2E8F0",borderRadius:16,overflow:"hidden",marginBottom:4}}>
              <img src={qrURL(prod.price,id)} alt="VietQR" style={{width:220,height:220,display:"block"}}/>
            </div>
            <div style={{background:"#F8FAFC",borderRadius:12,padding:"14px 20px",margin:"16px 0",textAlign:"left",border:"1px solid #E2E8F0"}}>
              <div style={{fontSize:11.5,color:"#64748B",fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:.4}}>Thông tin chuyển khoản</div>
              {[["🏦 Ngân hàng","VPBank"],["👤 Chủ TK","NGUYEN VIET LONG"],["💳 Số TK","0913331916"],["💰 Số tiền",<b style={{color:"#1D4ED8"}}>{vnd(prod.price)}</b>],["📝 Nội dung",<b style={{color:"#DC2626",userSelect:"all"}}>{id}</b>]].map(([k,v],i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:"1px dashed #E2E8F0"}}>
                  <span style={{color:"#64748B"}}>{k}</span><span style={{color:"#0F172A",fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
            {/* Trạng thái polling */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14,fontSize:12,minHeight:24}}>
              {pollSt==="polling"&&<><span style={{display:"inline-block",width:14,height:14,border:"2px solid #2563EB",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><span style={{color:"#2563EB",fontWeight:600}}>Đang theo dõi thanh toán tự động qua SePay…</span></>}
              {pollSt==="error"&&<span style={{color:"#EF4444"}}>⚠️ Lỗi kết nối — thử lại sau 3s…</span>}
              {pollSt==="checking"&&<><span style={{display:"inline-block",width:14,height:14,border:"2px solid #059669",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><span style={{color:"#059669",fontWeight:600}}>Đang xác nhận…</span></>}
              {pollSt==="demo"&&<span style={{color:"#D97706",fontWeight:600}}>⚠️ Demo mode — SePay chưa kết nối</span>}
            </div>
          </>
        )}
      </div>
      {payState!=="success"&&(
        <div style={{padding:"0 28px 28px",display:"flex",flexDirection:"column",gap:10}}>
          {/* Nút demo khi SePay chưa cấu hình */}
          {(pollSt==="demo"||pollSt==="error")&&(
            <button className="kbv-btn" onClick={simulatePay} style={{background:"linear-gradient(135deg,#059669,#10B981)",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              ✅ Tôi Đã Chuyển Khoản (Demo)
            </button>
          )}
          <button onClick={()=>go("shop")} style={{background:"none",border:"1.5px solid #E2E8F0",color:"#64748B",borderRadius:12,padding:"12px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✕ Hủy & Quay Lại</button>
          <div style={{textAlign:"center"}}>
              <p style={{fontSize:11,color:"#94A3B8",marginBottom:8}}>⚡ Hệ thống tự động xác nhận qua SePay khi nhận thanh toán.</p>
              <a href="https://zalo.me/0913331916" target="_blank"
                style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,color:"#0068FF",fontWeight:600,textDecoration:"none"}}>
                💬 Zalo hỗ trợ: 0913331916
              </a>
            </div>
        </div>
      )}
    </div>
  </div>);
}

function SuccessPage({order,go}){
  const [dlUrl,setDlUrl]         = useState(null);
  const [dlLoading,setDlLoading] = useState(true);
  const [dlError,setDlError]     = useState(null);
  const [downloaded,setDownloaded] = useState(false);

  // Kiểm tra đã tải trong session chưa
  useEffect(()=>{
    if(!order) return;
    if(sessionStorage.getItem(`dl_${order.id}`)==="done") setDownloaded(true);
  },[order]);

  const doDownload = (url) => {
    sessionStorage.setItem(`dl_${order.id}`,"done");
    setDownloaded(true);
    window.location.href = url;
  };

  useEffect(()=>{
    if(!order || downloaded) return;
    (async()=>{
      try{
        const productId=order.prod.id||order.prod._id||"";
        const res=await fetch(`/api/get-download-link?orderId=${order.id}&productId=${productId}&amount=${order.prod.price}`);
        const data=await res.json();
        if(data.token){
          const tokenUrl=`/api/download?token=${data.token}`;
          setDlUrl(tokenUrl);
          setTimeout(()=>doDownload(tokenUrl),2500);
        } else if(data.url){
          setDlUrl(data.url);
          setTimeout(()=>doDownload(data.url),2500);
        } else {
          setDlError("Không lấy được link tải. Liên hệ khobanve2d@gmail.com");
        }
      }catch(e){setDlError("Lỗi kết nối server.");}
      finally{setDlLoading(false);}
    })();
  },[order]);

  if(!order) return null;

  return(
    <div style={{maxWidth:540,margin:"60px auto",padding:"0 20px",textAlign:"center"}}>
      <div className="kbv-fadeup" style={{background:"#fff",borderRadius:20,padding:"48px 32px",boxShadow:"0 8px 40px rgba(15,23,42,.14)"}}>
        <div style={{fontSize:72,marginBottom:16}}>🎉</div>
        <div style={{fontFamily:"'Be Vietnam Pro',sans-serif",fontSize:26,fontWeight:800,color:"#059669",marginBottom:8}}>Thanh Toán Thành Công!</div>
        <div style={{fontSize:15,color:"#64748B",marginBottom:24,lineHeight:1.7}}>
          {downloaded
            ? "File đã được tải xuống thành công."
            : <span>Cảm ơn bạn đã mua bản vẽ.<br/>Đang tạo link tải bảo mật — chỉ dùng được 1 lần.</span>}
        </div>

        <div style={{background:"#F0FDF4",borderRadius:14,padding:"18px 22px",marginBottom:24,border:"1px solid #BBF7D0"}}>
          <div style={{fontSize:13,color:"#64748B",marginBottom:8}}>📦 Đơn hàng của bạn</div>
          <div style={{fontWeight:700,color:"#0F172A",fontSize:14,lineHeight:1.5}}>{order.prod.title}</div>
          <div style={{fontSize:12,color:"#94A3B8",marginTop:4}}>Mã đơn: <b>{order.id}</b></div>
        </div>

        {/* Nút tải */}
        {dlLoading && !downloaded
          ? <div style={{padding:"16px",color:"#64748B",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{display:"inline-block",width:16,height:16,border:"2px solid #2563EB",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
              Đang tạo link tải bảo mật…
            </div>
          : dlError
            ? <div style={{textAlign:"center",padding:"14px",color:"#EF4444",fontSize:13,lineHeight:1.8}}>
                {dlError}
                <div style={{marginTop:10}}>
                  <a href="https://zalo.me/0913331916" target="_blank"
                    style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0068FF",color:"#fff",textDecoration:"none",borderRadius:10,padding:"8px 18px",fontSize:13,fontWeight:600}}>
                    💬 Zalo: 0913331916
                  </a>
                </div>
              </div>
            : downloaded
              ? <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:12,padding:"15px",textAlign:"center",fontSize:15,fontWeight:700,color:"#059669",marginBottom:10}}>
                  ✅ Đã tải xuống thành công!
                </div>
              : dlUrl
                ? <button onClick={()=>doDownload(dlUrl)}
                    style={{width:"100%",background:"linear-gradient(135deg,#059669,#10B981)",color:"#fff",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>
                    📥 Tải File Ngay
                  </button>
                : null
        }

        <button onClick={()=>go("home")} style={{width:"100%",background:"none",border:"1.5px solid #E2E8F0",color:"#64748B",borderRadius:12,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          ← Về Trang Chủ
        </button>
        {!downloaded && <p style={{fontSize:11.5,color:"#94A3B8",marginTop:16}}>⏱ Link tự động mở sau 3 giây. Mỗi link chỉ dùng 1 lần trong 15 phút.</p>}
      </div>
    </div>
  );
}


function App(){
  // Detect /admin path
  const isAdmin = window.location.pathname.startsWith("/admin");
  if (isAdmin) return <AdminPage/>;

  const [page,setPage]=useState("home");
  const [catFilter,setCatFilter]=useState("all");
  const [query,setQuery]=useState("");
  const [prod,setProd]=useState(null);
  const [order,setOrder]=useState(null);
  const [payState,setPayState]=useState("waiting");
  const { prods } = useProducts();
  const go=useCallback((p,data=null)=>{if(data)setProd(data);setPage(p);window.scrollTo(0,0);},[]);
  const buy=useCallback((p)=>{const oid=genOid();setOrder({id:oid,prod:p});setPayState("waiting");setPage("pay");window.scrollTo(0,0);},[]);
  const shared={go,buy,catFilter,setCatFilter,query,setQuery,prod,order,payState,setPayState,prods};
  return(<div style={{fontFamily:"'Be Vietnam Pro',sans-serif",background:"#F1F5F9",minHeight:"100vh",color:"#0F172A"}}>
    <Header page={page} go={go} query={query} setQuery={setQuery}/>
    {page==="home"&&<HomePage {...shared}/>}
    {page==="shop"&&<ShopPage {...shared}/>}
    {page==="detail"&&<DetailPage {...shared}/>}
    {page==="pay"&&<PayPage {...shared}/>}
    {page==="success"&&<SuccessPage {...shared}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
